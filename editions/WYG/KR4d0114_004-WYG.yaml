body:
  text: 游廌山集巻四宋游酢撰論士風奏疏天下之患莫大于士大夫至于無恥則見利而已不復知有他如入市而攫金不復見有人也始則衆笑之少則人惑之久則天下相率而效之莫知以為非也士風之壞一至于此則錐刀之末將盡爭之雖殺人而謀其身可為也迷國以成其私可為也草竊姦宄奪攘矯䖍何所不至而人君尚何所賴乎古人有言禮義廉恥謂之四維四維不張國非其有也今欲使士大夫人人自好而相高以名節則莫若朝廷之上倡清議于天下士有頑頓無恥一不容于清議者將不得齒于縉紳親戚以為羞鄉黨以為辱夫然故士之有志于義者寧饑餓不能出門戸而不敢以喪節寧阨窮終身不得聞達而不敢以敗名廉恥之俗成而忠義之風起矣人主何求而不得哉惟陛下留意孫莘老易傳序易之為書該括萬有而一言以蔽之則順性命之理而已陰陽之有消長剛柔之有進退仁義之有隆汚三極之道皆原于一而㑹于理其所遭者時也其所託者義也其所致者用也知斯三者而天下之理得矣斯理也仰則著于天文俯則形于地理中則隠於人心而民之迷日久不能以自得也冥行于利害之域而莫知所向聖人有憂之此易之所為作也伏羲象之而八卦成文王重之而六爻具周公繫之辭仲尼訓其義自伏羲至仲尼則易之書不遺餘㫖矣葢將領天下於中正之塗而要于時措之宜也居則觀象而玩辭動則觀變而玩占以研心則慮精以應物則事舉天且助之人且與之而何凶咎之有故曰是興神物以前民用又曰因貳以濟民行此四君子之用心也孫公莘老少而好易常以是行已亦以是立朝或進或退或語或黙或從或違皆占於易而後行也晚而成書辭約而㫖明義直而事核又將與學者共之葢亦先聖之所期豈徒為章句以自名家而已此先生傳易之意也學者宜以是觀之家譜後序往酢從事於伊川程夫子之門謂儒者之道首在敦倫睦族謹書諸紳以誌不諠富哉言乎昔姬公陳詩以告孺子王必丕揚其祖徳非獨紹聞衣徳言亦以啓佑我後人也然而難言之矣宗族之壞每在數傳而後其間保無一二式微世世雷同附和者或高曽皆不可問舉一勲名爛然絶無干涉之人奉以為吾祖吾祖也恥孰甚焉獨吾族不然吾族於春秋時最顯粤我先人博物洽聞顯名於諸侯澤潤生民與東里子産並傳不朽如傳稱子太叔者是也迨伯度公佐魏卓卓著功業伯始公繼起風裁高峻節烈矯然世奉為日星河嶽葢亦後先濟美者矣再傳簡之公為唐南豐令多所膏澤及於民至今廟祀不衰自時厥後本朝太平興國間簪纓朱芾蟬聯至今巨族之稱由來尚矣酢膺祖父之休承乏俎豆而顧使先人之澤散佚無傳焉是誰之咎哉獨不敢少有侵假令支系混淆世次紊亂蹈雷同附和之譏是編之葺兄醇倡其事酢用成之則惟以別其流者澄其源庶無負乎敦倫睦族之訓也已若謂光前人之烈以垂裕後昆也則吾豈敢宣義胡公墓誌銘公諱淵字澤之姓胡氏其先江南人唐末避地於建州崇安之籍溪曽祖敏祖容皆率徳不耀父罕負氣節重然諾鄉鄰有競者不決於有司而聽其一言環左右數百家終嵗無訟資産本饒給羣從數數稱貸無所償以故致空匱怡然終不恨公生而聰敏蚤嵗能綴文及冠試於有司不與選而益務强識下至陰陽卜筮之書無不精究親老家貧於是往來授學江浙間嵗終度父母所須力能致者盡市歸以獻退無私焉丁外艱母有末疾不復逺遊里閈教生徒晨夕歸省祁寒暑雨不移晷毎諸生饋食有鮮肥悉持歸以佐母膳母憐其誠為之强進而疏食飲水躬自安之既永感晚寓江湖間而家焉嵗時追慕常欲歸省墳壠子孫以年高力諫止之公曰吾少不能致禄養一恨也晚以貧故不能處先廬終灑掃二恨也今雖七十筋力猶健得一歸上冢死且瞑目矣既歸表識阡原補植松檟徘徊顧瞻一慟而去行道為之惻楚以子通籍再封宣義郎宣和元年十一月壬子卒於所居之正寢子男五人二早卒安國朝奉郎新差權發遣提舉江南東路學士安止安皆幼女二人長適宿州教授范舜舉次在室孫男女四人完貢入太學方慶厯皇祐間書籍多未刋皆手傳公為兒童時父所傳書於同鄉仙洲吳居士之家居士閲其所寫論語字體謹慎終二十篇文無誤又視瞻凝審重歎賞之有女未嫁聰睿少倫讀書能探微㫖為擇對不輕許察公端慤特以妻之公既資純孝又得賢配相與竭力以事其親雖戹窮貧窶而閨門之内雍如也初安國典教荆州數與守忤公知其性峻促使求田問舎而夫人又每誡其子曰人患無徳義耳汝慎毋得以生事累其心公乃自為葺廬舎買田數頃語妻孥曰古者人有恒産故士不仰禄今之宦遊者率低徊餼廩以自負於義一招廢斥置父母妻子於飢寒恝然無念可乎居無何其子使湖外論薦隠士屬吏訴之以為所薦者黨人鄒公浩所囑而故相范公之門人也坐是除名歸而託於所葺之田廬安處無外營親舊乃知公識微而慮逺也後朝廷復其子官總益部而涉逺道歴險塗恐難以奉安輿將歸誠控聞又恐不知者隨而媒孽之以貽親憂躊躇未決公察其意乃曰世間禍福非人謀所及汝自擇於義可也卒聴其子棄官就養處約雖久訖無悔辭自其子入官盡斥其俸餘以贍兄弟之子又取其子而教之激其惰而揚其能必欲成就而後已臨終語安國曰儒者特立獨行不加少以為多汝當以古人自期言訖而逝次年庚子三月辛酉其子遵治命以公入夫人之兆將葬來請銘銘曰孰不為事事莫嚴於親孰不為守守莫先於身惟此兩者公得之於已而又以成其子之仁少也文詞發策上第壯也學行望隆縉紳而且惕然内省力久不息以要於古人則公之子也公誰與倫書明道先生行狀後先生道徳之高致經綸之逺圖進退之大節伊川季先生與門人高第既論其實矣酢復何言謹拾其遺事備採録云先生生而有妙質聞道甚早年逾冠明誠夫子張子厚友而師之子厚少時自喜其才謂提騎卒數萬可横行匈奴視叛羌為易與耳故從之游者多能道邊事既而得聞先生議論乃歸謝其徒盡棄其舊學以從事於道其視先生雖外兄弟之子而虚心求益之意懇懇如不及逮先生之官猶以書抵扈以定性未能不動致問先生為破其疑使内外動靜道通為一讀其書可考而知也其後子厚學成徳尊識者謂與孟子比然猶秘其學不多為人講之其意若曰雖復多聞不務畜徳徒善口耳而已故不屑與之言先生謂之曰道之不明於天下久矣人善其所習自謂至足必欲如孔門不憤不啓不悱不發則師資勢隔而先王之道或幾乎熄矣處今之時且當隨其資而誘之雖識有明暗志有淺深亦各有得焉而堯舜之道庶可馴致子厚用其言故關中學者躬行之多與洛人並推其所自先生發之也擢為御史睿眷甚渥亟承徳音所獻納必據經術事常辨於早而戒於漸一日神宗縱言及於辭命先生曰人主之學惟當務為急辭命非所先也神宗為之動顔㑹同天節宫嬪専獻奇巧為天子壽先生既言於朝又顧謂執政戒之執政曰宫嬪實為非上意也庸何傷先生曰作淫巧以蕩上心所傷多矣公之言非是執政辭遂屈是時有同在臺列者志未必同然心慕其為人嘗語人曰他人之賢者猶可得而議也乃若伯淳則如美玉然反復視之表裏洞徹莫見疵瑕先生平生與人交無隠情雖僮僕必託以忠信故人亦不忍欺之嘗自澶淵遣奴持金詣京師貿用物計金之數可當二百千奴無父母妻子同列聞之莫不駭且誚既而奴持物如期而歸衆始歎服葢誠心發於中暢于四肢見之者信慕事之者革心大抵類此先生少長親闈視之如傷又氣象清越灑然如在塵外宜不能勞苦及遇事則每與賤者同起居飲食人不堪其難而先生處之裕如也嘗董役雖祁寒烈日不擁裘不御葢時所巡行衆莫測其至故人自致力嘗先期畢事異時夫伍中夜多譁一夫或怖萬夫競起姦人乗虚為盜者不可勝數先生以師律處之遂訖去無譁者及役罷夫散部伍猶肅整如常初至鄠有監酒税者以賄播聞然怙力文身自號能殺人衆皆憚之雖監司州將不敢發先生至將與之同事其人心不自安輒為言曰外人謂某自盜官錢新主簿將發之某勢窮必殺人言未訖先生笑曰人之為言一至於此足下食君之禄詎肯為盜萬一有之將救死不暇安能殺人其人黙不敢言後亦私償其所盜卒以善去州從事有既孤而遭祖母喪者身為嫡孫未果承重先生為推典法意告之甚悉其人從之至今遂為定令而天下縉紳始習為常葢先生御小人使不麗於法助君子使必成其美又大抵類此先生雖不用而未嘗一日忘朝廷然久幽之操確乎如石胸中之氣沖如也所至士大夫多棄官從之學朝見而夕歸飲其和茹其實既久而不能去其徒有貧者以單衣御冬累年而志不變身不屈葢先生之教要出於為已而士之游其門者所學皆心到自得無求於外以故甚貧者忘饑寒已仕者忘爵禄魯重者敏謹細者裕强者無拂理愿者有立志可以修身可以齊家可以治國平天下非若世之士妄意空無追咏昔人之糟粕而身不與焉及措之事業則倀然無據而已也方朝廷圖任真儒以惠天下天下有識者謂先生行且大用矣不幸而先生卒嗚呼道之行與廢果非人力所能為也悲夫哭而為之贊曰天地之心其太一之體與天地之化其太和之運與確然高明萬物覆焉隤然博厚萬物載焉非以其一與陽自此舒陰自此凝消息盈虚莫見其形非以其和與夫子之徳其融心滌慮黙契於此與不然何穆穆不已渾渾無涯而能言之士莫足以頌其美與嗟乎孰謂此道未施此民未覺而先覺者逝與百世之下有想見夫子而不可得者亦能觀諸天地之際與祭陳了翁文嗚呼陳公萬夫之傑大虛無塵心疑知徹經綸大猷如挈裘領灼知幾先眇綿作炳慮逺而知者疑先危而弱者警蓍龜有稽可觀而省嗚呼陳公知事道而已不知鼎鑊之臨其顛也知殉國而已不知蹈穽之横其前也阨之白首而氣愈和蹙之死地而志愈堅處約彌久妻孥裕然畎畝念忠頂踵利物人疑其為墨平生拯飢任重一身吾知其為稷行道之人聞者心惻意者天將降之大任而空乏其身耶意者吾君將追念其篤誠發獨㫁而收之以澤斯民耶嗚呼孰謂流離川塗邅迴萬狀而淪于淮楚之濱耶嗚呼孰謂謀猷可以託心腹膂力可以任股肱而志願卒不伸耶浩浩元精慘不知其因耶嵗首之書後訃而達執書一慟骨驚心折嗚呼陳公葢將有哲人能盡知而賢之有志士能慷慨而言之有仁人能經紀其家而存之有良史能具載其實而傳之區區鄙詞曷足以涉其流而泝其源乎寓奠一觴聊薦悃愊東望傷懷淚落横臆尚饗跋陳居士傳昔揚子雲稱蜀人之賢以李仲元為畏人想見其人信順之氣積於中而暢於外葢黄叔度之流惟以生於逺方不聞於中原士大夫獨因雄書而名載於後世今陳居士含徳隠厚沈溟於七閩之下邑未有能知之者吾友中立為發其藴以紹其子孫吾知其與仲元俱不朽矣此于名教豈小補哉政和二年孟夏中澣書五言律餞賀方回分韻得歸字邀客十分飲送君千里歸情隨緑水去目㫁白鷗飛松菊今應在風塵昔已非維舟後夜月能不重依依歸鴈天末驚風急江湖野思長悲鳴愁絶塞接翼冒風霜澤岸多矰弋雲間乏稻粱茫然棲息地飲啄欲何鄉感事世事浮雲薄勞生一夢長散材依櫟社幽意慕濠梁風急鷹鸇迅霜殘草木黄投閒如有約早晚問耕桑七言律春日山行有感十里橋西別有天青山欲㫁翠雲連園林寂寂鹿為友野服翩翩儒亦仙風詠舞雩正此日雪飄伊洛是何年追尋往事頓成夢回首春光倍黯然游寶應寺崒嵂三峯帶白灣誰開蘭若翠微間竹牀雲懶禪心定草徑苔荒屐齒斑天入碧嵐成玉宇鳥飛青嶂出塵寰此中即是蘂珠境遮莫閒吟一解顔寶應寺讀書堂成因懷明道先生橋西積雪度新晴卜築茅堂快落成郁郁奇花鋪野趣關關好鳥和書聲春濃嵐色無邊景水淨天光徹底清記得程門窻草緑至今遐想每馳情六言絶句山中即景翠靄光風世界青松緑竹人家天外飛來野鳥澗中流出桃花七言絶句題河清縣廨小院閒亭長薜蘿鹿來穿徑晚經過夕陽蕭散簿書少窻裏南山明月多水亭清溪一曲繞朱樓荷宻風稠咽㫁流夾岸垂楊烟細細小橋流水即滄洲在潁昌寄中立絳帷燕侍每從容一聽微言萬慮空却愧猶懸三釡樂未能終此挹清風蕭條清潁一茅廬魂夢長懷與子居五里橋西楊柳路至今車馬往來疎龜山末句作可能鞭馬復來無登歸宗巖奇冠南閩此最奇歸宗千古是誰歸至今來訪誰先至知是曹劉先我知誨子三十年前宿草廬五年三第世間無門前獬豸公裳在只恐兒孫不讀書御史游公墓誌銘楊時吾友定夫既没之明年其子某自歴陽涉大江詣予而告曰先君之友惟公為最厚今既葬而幽堂之銘無辭以刻恐遂湮没無傳焉敢以是請予告之曰如先公之明徳皎如日星雖奴隸之賤皆知之其流風餘韻足以師世範俗豈待予言而傳乎然昔在元豐中俱受業於明道先生兄弟之門有友二人焉謝良佐顯道公其一也三年之間二公相繼淪亡存者獨予而已追念生平觸事無一不可悲者今吾子以銘見屬舎予其奚之公諱酢定夫其字也建州建陽人初與其兄醇俱以文行知名於時所交皆天下豪英公雖少而一時老師宿儒咸推先之伊川先生以事至京師一見謂其資可與適道是時明道先生知扶溝縣事先生兄弟方以倡明道學為已任設庠序聚邑人子弟敎之召公來職學事公欣然往從之得其微言於是盡棄故所習而學焉其後得邑河清予往見之伊川謂予曰游君徳器粹然問學日進政事亦絶人逺甚其在師門見稱如此則所造可知矣公於元豐五年登進士第調越州蕭山尉用侍臣薦召為太學録改宣徳郎除博士公以食貧待次奉親不便就擬知河南府河清縣忠宣范公判河南待以國士事有疑議必與之參訂移守潁昌辟公自隨為府學教授未幾還朝復秉國政即除公太學博士已而忠宣罷政公亦請外矣除齊州簽書判官㕔公事用年勞改奉議郎丁大中公憂服除再調泉州簽判上皇即位覃恩改承議郎賜緋衣銀魚袋還召為監察御史磨勘轉朝奉郎出知和州嵗餘管勾南京鴻慶宫居太平州兩乞再任以八寶恩轉朝散郎磨勘轉朝請郎知漢陽軍磨勘轉朝奉大夫以親老再乞宫祠除提㸃成都府長生觀丁太碩人憂服除除知舒州移知濠州不數月㑹從官謫守衝罷歸寓歴陽因家焉宣和五年五月乙亥以疾終於正寢享年七十有一是年十二月丙午與夫人合葬於和州含山縣昇城鄉車轅嶺之原用治命也公自幼不羣讀書一過目輒成誦比壯益自力心傳目到不為世儒之習誠於中形諸外儀容辭令燦然有文望之知其為成徳君子也其事親無違交朋友有信莅官遇僚吏有恩意雖人樂於自盡而無敢慢其令者惠政在民戴之如父母故去則見思愈久而不忘筮仕之初未更事縣有疑獄十餘年不能決公攝邑事一問得其情而釋之精練如素官者人服其明比年以來編民困於征斂而修奉祠館市材調夫無虚月所至騷然公歴守四郡處之裕如雖時有興造民初不知而事集此在公特其粃糠耳無足道者故不復縷載若其道學足以覺斯人餘潤足以澤天下遭時清明不及用而死此士論共惜之非予一已之私言也曽祖尚祖禮之不仕父潛贈太中大夫娶吕氏封宜人有賢行事舅姑以孝聞友姊姒睦婣族人無間言公素貧不治生産夫人攻苦食淡能宜其家則内助多矣先公三年卒享年六十有六子男七人撝文林郎洪州司兵曹事卒官擬捄握皆蚤世損迪功郎前授歸州司兵曹事掞將仕郎拂未仕皆業儒世其家女一人歸時之子遹孫男三人女五人有中庸義一巻易説一巻詩二南義一巻論語孟子雜解各一巻文集十巻藏於家銘曰嗚呼天乎胡不憗遺方時清明哲人其萎道雖不行斯文未亡百世而下其傳有光年譜宋仁宗皇祐五年癸巳二月十五日午時公生於建寧府隋立建安郡末改泉州唐建州宋初隸江南又隸兩浙尋以隸福建升建寧軍節度後升今名建陽之長平至和元年甲午公二嵗改元首年俱書嘉祐元年丙申公四嵗五年庚子公八嵗善屬文人稱神童英宗治平元年甲辰公十二嵗潛心孝經神宗熙寧元年戊申公十六嵗與兄質夫從族父執中於家塾三年庚戌公十八嵗同葉敦禮施景明從江處中於集公山五年壬子公二十嵗預鄉薦伊川先生見之京師謂其資可與適道八月明道先生令扶溝召職學事六年癸丑公二十一嵗禮部試下第補太學生歸八年乙卯公二十三嵗預太學薦元豐元年戊午公二十六嵗四年辛酉公二十九嵗與楊中立謝顯道以師禮見明道先生於潁昌録有明道先生語五年壬戌公三十嵗登黄裳榜進士六年癸亥公三十一嵗調越州蕭山尉三月長子撝生七年甲子公三十二嵗赴蕭山任八年乙丑公三十三嵗官蕭山用侍臣薦召為太學録六月晦聞明道先生訃設位哭于寢門作行狀七月次子擬生哲宗元祐元年丙寅公三十四嵗官太學録改宣徳郎除博士二年丁卯公三十五嵗官博士以食貧待次奉親不便就擬知河清縣三年戊辰公三十六嵗官河清四月三子拂生四年己巳公三十七嵗官河清是時忠宣范公判河南待以國士有疑義與之㕘訂移守潁昌辟公自隨為府學教授五年庚午公三十八嵗任教授五月四子損生六年辛未公三十九嵗任教授七年壬申公四十嵗任教授范公未幾還朝復秉鈞軸即除公太學博士七月五子掞生八年癸酉公四十一嵗官博士偕友中立離河清以師禮見伊川先生於洛録有伊川先生語紹聖元年甲戌公四十二嵗官博士六月六子捄生二年乙亥公四十三嵗官博士范公罷政公亦請外除簽書齊州判官㕔公事十二月女生及笄適中立三子遹三年丙子公四十四嵗官齊州十月丁父憂解官居制四年丁丑公四十五嵗在制葬大中升叔於寶應寺山元符元年戊寅公四十六嵗在制築草堂於廌山之麓著論孟雜解中庸義二年己卯公四十七嵗正月服闋再調泉州簽判築水雲寮於武夷之五曲為講論之所著易説詩二南義三年庚辰公四十八嵗赴泉州任十一月上皇即位召還為監察御史徽宗建中靖國元年辛巳公四十九嵗官御史論士風正月七子握生崇寧元年壬午公五十嵗官御史出知和州二年癸未公五十一嵗官和州三年甲申公五十二嵗官和州嵗餘管勾南京鴻慶宫四年乙酉公五十三嵗任鴻慶宫居太平州五年丙戌公五十四嵗仍太平大觀元年丁亥公五十五嵗仍太平二年戊子公五十六嵗仍太平三年己丑公五十七嵗仍太平四年庚寅公五十八嵗仍太平政和元年辛卯公五十九嵗仍太平兩乞再任知漢陽軍二年壬辰公六十嵗官漢陽三年癸巳公六十一嵗官漢陽四年甲午公六十二嵗官漢陽以親老再乞宫祠除提㸃成都府長生觀五年乙未公六十三嵗仍長生觀七月丁太碩人憂解官居制六年丙申公六十四嵗在制七年丁酉公六十五嵗十月服闋除知舒州重和元年戊戌公六十六嵗官舒州宣和元年己亥公六十七嵗官舒州移知濠州二年庚子公六十八嵗官濠州不數月㑹從官謫守衝罷歸寓歴陽因家焉五年癸卯公七十一嵗五月乙亥二十三日以疾終於正寢十二月丙午用公治命與夫人吕氏合葬於和州戰國屬楚秦歴陽縣晉歴陽郡後齊和州隋唐或歴陽郡或和州宋因之含山縣車轅嶺之原遂改名察院嶺文靖楊公誌其墓游廌山集巻四
