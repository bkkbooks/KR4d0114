body:
  text: 游廌山集卷三宋游酢撰師語一善言治天下者不患法度之不立而患人材之不成善修身一作善言人材者不患器質之不美而患師學之不明人材不成雖有良法美意孰與行之師學不明雖有受道之質孰與成之行之失莫甚於惡則亦改之而已矣事之失莫甚於亂則亦治之而已矣茍非自暴自棄者孰不可與為君子人有習他經既而舎之習戴記問其故曰決科之利也先生曰汝之是心已不可入於堯舜之道矣夫子貢之高識曷嘗規規於貨利哉特於豐約之間不能無留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可語也一本云明道知扶溝縣事伊川侍行謝顯道將歸應舉伊川曰何不止試於太學顯道對曰蔡人鮮習禮記決科之利也先生云云顯道乃止是嵗登第注云尹子言其詳如此先生不好佛語或曰佛之道是也其迹非也曰所謂迹者果不出於道乎然吾所攻其迹耳其道則吾不知也使其道不合於先王固不願學也如其合于先王則求之六經足矣奚必佛漢儒之中吾必以揚子為賢然於出處之際不能無過也其言曰明哲煌煌旁燭無疆孫於不虞以保天常孫於不虞則有之旁燭無疆則未也光武之興使雄不死能免誅乎觀於朱泚之事可見矣古所謂言孫者迫不得已如劇秦美新之類非得已者乎天下之習皆緣世變秦以棄儒術而亡不旋踵故漢興頗知尊顯經術而天下厭之故有東晉之放曠人有語導氣者問先生曰君亦有術乎曰吾嘗夏葛而冬裘饑食而渴飲節嗜欲定心氣如斯而已矣世有以讀書為文為藝者曰為文謂之藝猶之可也讀書謂之藝則求諸書者淺矣萬物本乎天人本乎祖故冬至祭天而祖配之以冬至者氣至之始故也萬物成形於地而人成形於父故以季秋享帝而父配之以季秋者物成之時故也世之信道篤而不惑異端者洛之堯夫秦之子厚而已孟子之時去先王為未逺其學比後世為尤詳又載籍未經秦火然而班爵禄之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於漢儒一時之傅㑹奈何欲盡信而句為之解乎然則其事固不可一二追復矣人必有仁義之心然後仁與義之氣晬然達於外故不得於心勿求於氣可也君子之教人或引之或拒之各因其所虧者成之而已孟子之不受曹交以交未嘗知道固在我而不在人也故使歸而求之孟子論三代之學其名與王制所記不同恐漢儒所記未必是也象憂亦憂象喜亦喜葢天理人情於是為至舜之於象周公之於管叔其用心一也夫管叔未嘗有惡也使周公逆知其將畔果何心哉惟其管叔之畔非周公所能知也則其過有所不免矣故孟子曰周公之過不亦宜乎孟子言舜完廩浚井之説恐未必有此事論其理而已堯在上而使百官事舜於畎畝之中豈容象得以殺兄而使二嫂治其棲乎學孟子者以意逆志可也或謂佛之理比孔子為徑曰天下果有徑理則仲尼豈欲使學者迂逺而難至乎故外仲尼之道而由徑則是冒險阻犯荆棘而已窮經將以致用也如誦詩三百授之以政不達使於四方不能専對雖多亦奚以為今世之號為窮經者果能達於政事専對之間乎則其所謂窮經者章句之末耳此學者之大患也問我於辭命則不能恐非孔子語葢自謂不能辭命則以善言徳行自居矣恐君子或不然曰然孔子兼之而自謂不能者使學者務本而已孟子曰事親若曽子可也吾以為事君若周公可也葢子之事父臣之事君聞有自知其不足者矣未聞其為有餘也周公之功固大矣然臣子之分所當為也安得獨用天子之禮乎其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼論而非之以為周公其衰矣師保之任古人難之故召公不説者不敢安於保也周公作書以勉之以為在昔人君所以致治者皆賴其臣而使召公謀所以裕已也復子明辟如稱告嗣天子王矣工尹商陽自謂朝不坐宴不與殺三人足以反命慢君莫甚焉安在為有禮夫君子立乎人之本朝則當引其君於道志於仁而後已彼商陽者士卒耳惟當致力於君命而乃行私情於其間孔子葢不與也所謂殺人之中又有禮焉者疑記者謬盟可用也要之則不可故孔子與蒲人盟而適衞者特行其本情耳葢與之盟與未嘗盟同故孔子適衞無疑使要盟而可用與賣國背君亦可要矣不知天則於人之愚智賢否有所不能知雖知之有所不盡故思知人不可以不知天不知人則所親者或非其人所由者或非其道而辱身危親者有之故思事親不可不知人故堯之親九族亦明俊徳之人為先葢有天下者以知人為難以親賢為急二南之詩葢聖人取之以為天下國家之法使邦國鄉人皆得歌咏之也有天下國家者未有不自齊家始先言后妃次言夫人又次言大夫妻而古之人有能修之身以化在位者文王是也故繼之以文王之詩關雎詩所謂窈窕淑女即后妃也故序以為配君子所謂樂而不淫哀而不傷葢關雎之義如此非謂后妃之心為然也安定之門人往往知稽古愛民矣則於為政也何有古者鄉田同井而民之出入相友故無爭鬭之獄今之郡邑之訟往往出于愚民以戾氣相搆善為政者勿聽焉可也又時取强暴而好譏侮者痛懲之則柔良者安鬬訟可息矣君子之遇事無巨細一於敬而已簡細故以自崇非敬也飾私智以為奇非敬也要之無敢慢而已語曰居處恭執事敬雖之夷狄不可棄也然則執事敬者固為仁之端也推是心而成之則篤恭而天下平矣士之所難者在有諸已而已能有諸已則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡而已則能不受變於俗者鮮矣馮道更相數主皆其讐也安定以為當五代之季生民不至於肝腦塗地者道有力焉雖事讐無傷也荀彧佐曹操誅伐而卒死於操君實以為東漢之衰彧與攸視天下無足與安劉氏者惟操為可依故俯首從之方是時未知操有他志也君子曰在道為不忠在彧為不智如以為事固有輕重之權吾方以天下為心未暇恤人議已也則枉已者未有能直人者也世之議子雲者多疑其投閣之事以法言觀之葢未必有又天禄閣世傳以為高百尺宜不可投然子雲之罪特不在此黽勉於莽賢之間畏死而不敢去是安得為大丈夫哉公山弗擾以費叛不以召畔人逆黨而召孔子則其志欲遷善悔過而未知其術耳使孔子而不欲往是沮人為善也何足以為孔子道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所嚴一作敬以至為夫婦為長幼為朋友無所為而非道此道所以不可須臾離也然則毁人倫去四大者其離於道也逺矣故君子之於天下也無適也無莫也義之與比若有適有莫則於道為有間非天地之全也彼釋氏之學於敬以直内則有之矣義以方外則未之有也故滯固者入於枯槁疏通者歸於肆恣一作放肆此佛之教所以為隘也吾道則不然率性而已斯理也聖人於易備言之乾聖人之分也可欲之善屬焉坤學者之分也有諸已之信屬焉仲尼言仁未嘗兼義獨於易曰立人之道曰仁與義而孟子言仁必以義配葢仁者體也義者用也知義之為用而不外焉可與語道矣世之所論于義者多外之不然則混而無別非知仁義之説者也門人有曰吾與人居視其有過而不告則於心有所不安告之而不受則奈何曰與之處而不告其過非忠也要使誠意之交通在于未言之前則言出而人信矣剛毅木訥質之近乎仁也力行學之近乎仁也若夫至仁則天地為一身而天地之間品物萬形為四肢百體夫人豈有視四肢百體而不愛者哉聖人仁之至也獨能體是心而已曷嘗支離多端而求之身外乎故能近取譬者仲尼所以示子貢以為仁之方也醫書有以手足風頑謂之四體不仁為其疾痛不以累其心故也夫手足在我而疾痛不與知焉非不仁而何世之忍心無恩者其自棄亦若是而已一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣故曰道也者不可須臾離也可離非道也修此道者戒慎乎其所不睹恐懼乎其所不聞而已由是而不息焉則上天之載無聲無臭可以馴致也君子之於中庸也無適而不中則其心與中庸無異體矣小人之於中庸無所忌憚則與戒慎恐懼者異矣是其所以反中庸也責善之道要使誠有餘而言不足則於人有益而在我者無辱矣師語二理與心一而人不能㑹之為一仲尼元氣也顔子春生也孟子并秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其才葢亦時然一作焉而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可以見之矣仲尼無迹顔子微有迹孟子其迹著人心常要活則周流無窮而不滯於一隅老子曰無為又曰無為而無不為當有為而以無為為之是乃有為為也聖人作易未嘗言無為惟曰無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之説矣語聖則不異事功則有異夫子賢於堯舜語事功也孔子言語句句是自然孟子言語句句是實事論學便要明理論治便須識體蹇便是處蹇之道困便是處困之道道無時不可行孟子有功於道為萬世之師其才雄只見雄才便是不及孔子處人須當學顔子便入聖人氣象父子君臣天下之定理無所逃於天地之間安得天分不有私心則一本無天分不則字行一不義殺一不辜有所不為有分毫私便不是王者事訂頑立心便達得天徳孔子儘是明快人顔子儘豈弟孟子儘雄辨孔子為中都宰知其不可為而為之不仁不知而為之不知豈有聖人不盡仁知責上責下而中自恕已豈可任職分萬物無一物失所便是天理時中公孫碩膚赤舄几几為君盡君道為臣盡臣道過此則無理坤作成物是積學處乾知大始是成徳處孔子請討田恒當時得行便有舉義為周之意九二利見大人九五利見大人聖人固有在上者在下者雖公天下事若用私意為之便是私唯上智與下愚不移移則不可知上之為聖下之為狂在人一身念不念為進退耳居處恭執事敬與人忠充此便晬面盎背有諸中必形諸外觀其氣象便見得天命不已文王純於天道亦不已純則無二無雜不已則無間㫁先後不能動人只是誠不至於事厭倦皆是無誠處氣直養而無害便塞乎天地之間有少私意即是氣虧無不義便是集義有私意便是餒心具天徳心有不盡處便是天徳處未能盡何緣知性知天盡已心則能盡人盡物與天地參贊化育贊則直養之而已鼓萬物而不與聖人同憂天理鼓動萬物如此聖人循天理而欲萬物同之所以有憂患章外見之物含章可貞來章有慶須要反已敬義夾持直上達天徳自此舞射便見人誠古之教人莫非使之成已自灑掃應對便上可到聖人事樂莫大焉樂亦在其中不改其樂須知所樂者何事乾坤古無此二字作易者特立此二字以明難明之道以此形容天地間事易聖人所以立道窮神則無易矣孔子為宰則為宰為陪臣則為陪臣皆能發明大道孟子必得賓師之位然後能明其道猶之有許大形象然後為泰山許多水然後為海以此未及孔子夷惠有異于聖人大成處然行一不義雖得天下不為與孔子同者以其誠一也顔子作得禹稷湯武事功若徳則別論文章成功有形象可見只是極致事業然所以成此事功者即是聖也萬物之始皆氣化既形然後以形相禪有形化形化長則氣化漸消中庸言無聲無臭勝如釋氏言非黄非白心有所存眸子先發見張兄言氣自是張兄作用立標以明道張兄一作横渠後同乾是聖人道理坤是賢人道理易之有象猶人之守禮法師語三惟善變通便是聖人聖人於天下事自不合與只順得天理茂對時育萬物學原於思仁人此義宜此事親仁之實從兄義之實須去一道中別出孔子言仁只説出門如見大賓使民如承大祭看其氣象便須心廣體胖動容周旋中禮自然惟是慎獨便是守之之法聖人脩已以敬以安百姓篤恭而天下平惟上下一於恭敬則天地自位萬物自育氣無不和四靈何有不至此體信達順之道聰明睿智由是出以此事天饗帝故中庸言鬼神之徳盛而終之以微之顯誠之不可揜如此博施濟衆非聖不能何曽干仁事故特曰夫仁者達人立人取譬可謂仁之方而已使人求之自反便見得也雖然聖人未有不盡仁然教人不得如此指煞鬼是往而不反之義天人本無二不必言合儼然即之温言厲佗人温則不厲儼然則不温惟孔子全之節嗜慾定心氣即是天氣下降地氣上騰便和無疾看一部華嚴經不如看一艮卦經只言一止觀論性不論氣不備論氣不論性不明二之則不是人自孩提聖人之質已完只先於偏勝處發或仁或義或孝或弟自幼子常視無誑以上便是教以聖人事人之知思因神以發成已須是仁推成已之道成物便是智非禮勿視聽言動積習儘有功禮在何處去氣偏處發便是致曲去性上修便是直養然同歸於誠不有躬無攸利不立已後雖向好事猶為化物不得以天下萬物撓己巳立後自能了當得天下萬物地不改闢民不改聚只修治便了飢食渴飲冬裘夏葛若致些私吝心在便是廢天職凡物參和交感則生不和分散則死凡有氣莫非天凡有形莫非地二氣五行剛柔萬殊聖人所由惟一理人須要復其初有形總是氣無形只是道咸六四言貞吉悔亡言感之不可以心也不得只恁地看過更留心存養熟後泰然行將去便有進艮卦只明使萬物各有止止分便定曽子疾病只要以正不慮死與武王殺一不辜行一不義得天下不為同心卜筮在精誠疑則不應懈意一生便是自棄自暴勿忘勿助長必有事焉只中道上行天下之悦不可極惟朋友講習雖過悦無害兑澤有相滋益處凝然不動便是聖人多驚多怒多憂只去一事所偏處自克克得一件其餘自正人少長須激昂自進中年已後自至成徳者事方可自安致知在格物物來則知起物各付物不役其知則意誠不動意誠自定則心正始學之事也明徳新民豈分人我是成徳者事靜後見萬物自然皆有春意天之生物無窮物之所成却有別和平依磬聲玉磬聲之最和平者養心羊頭山老子説一稃二米秬黍直是天地和氣十分豐熟山上便有山下亦或有之八十四聲清者極吹盡清濁者盡吹極濁就其中以中聲上生下生以一作考霜露星之氣異乎雨雪密雲不雨尚往則氣散先陰變風氣隨風散苔木氣為水土始發始一作所明善在明守善在誠復卦非天地之心復則見天地之心聖人無復故未嘗見其心管攝天下人心收宗族厚風俗使人不忘本須是明譜系世族與立宗子法周南召南如乾坤今之祭祀無樂今之樂又不可用然又却不見得緩急之節孔子所遇而安無所擇自子路觀孔子孔子為不恭自孔子觀吾輩吾輩便隘惟其與萬物同流便能與天地同流技擊不足以當節制節制不足以當仁義使人人有子弟衞父兄之心則制梃以撻秦楚之兵矣語黙猶晝夜晝夜猶生死生死猶古今鉛鐵性殊㸃化為金則不辨鉛鐵之性民須仁之物則愛之聖人緣人情以制禮事則以義制之息止也生也止則便生不止則不生不常其徳則所勝來復正常其理則所勝同化曽㸃漆雕已見大意故聖人與之顔子所言不及孔子無伐善無施勞是他顔子性分上事孔子言安之信之懷之是天理上事心風人力倍平常將死者識能預知只是他不著別事雜亂兼無昏氣人須致一如此孔子之時事雖有不可為孔子任道豈有不可為魯君齊君孔孟豈不知其不足與有為君實篤厚晦叔謹嚴堯夫放曠根本須是先培壅然後可立趨向也趨向既正所造有淺深則由勉與不勉也人多昏其心聖賢則去其昏中説有後人綴緝之揚子之學實韓子之學華華則涉道淺祭而立尸只是古人質顔子簞瓢非樂也忘也庾公之斯取其不背學而已楊墨皆學仁義而流者也墨子似子張楊子似子夏孔子免匡人之圍亦茍脱也四端不言信信本無在在易則是至理在孟子則是氣仰之彌高見其高而未能至也鑽之彌堅測其堅而未能達也此顔子知聖人之學而善形容者也義之精者須是自求得之如此則善求義也讀論語孟子而不知道所謂雖多亦奚以為湯既勝夏欲遷其社不可聖人所欲不踰矩既欲遷社而又以為不可欲遷是則不可為非矣不可是則欲遷為非矣然則聖人亦有過乎曰非也聖人無過夫亡國之社遷之禮也湯存之以為後世戒故曰欲遷則不可也記曰喪國之社屋之不受天陽也又曰亳社北牖使陰明也春秋書亳社災然則皆是湯之不遷始也古者百步為畝百畝當今之四十一畝也古以今之四十一畝之田八口之家可以無飢今以古之二百五十畝猶不足農之勤惰相懸乃如此古之時民居少人各就高而居中國雖有水亦未為害也及堯之時人漸多漸就平廣而居水泛濫乃始為害當是時龍門未闢伊闕未拆砥柱未鑿堯乃因水之流濫而治之以為天下後世無窮之利非堯時水特為害也葢已久矣上世人少就高而居則不為害後世人多就下而處則為害也四凶之才皆可用堯之時聖人在上皆以其才任大位而不敢露其不善之心堯非不知其不善也伏則聖人亦不得而誅之及堯舉舜於匹夫之中而禪之位則是四人者始懷憤怨不平之心而顯其惡故舜得以因其迹而誅竄之也人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣今人以影祭皆畫工所傳一髭髮不當則所祭已是別人大不便今之税實輕於什一但斂之無法與不均耳有一物而相離者如形無影不害其成形水無波不害其為水有兩物而必相須者如心無目則不能視目無心則不能見古者八十絲為一升斬衰三升則是二百四十絲於今之布為已細緦麻十五升則是千有二百絲今葢無有矣古之學者為已今之學者為人古之仕者為人今之仕者為已古之强有力者將以行禮今之强有力者將以為亂方今有古之所無者二兵與釋老也言而不行是欺也君子欺乎哉不欺也汎乎其思不若約之可守也思則來捨則去思之不熟也聖人之言逺如天賢者小如地天之付與之謂命稟之在我之謂性見於事業之謂理事君有犯無隠事親有隠無犯有時而可分治必有為治之因亂必有為亂之因視其所以觀人之大槩察其所安心之所安也子絶四毋自任私意毋必為毋固執毋有已居是邦也不非其大夫此理最好養親之心則無極外事極時須為之極莫若極貴貴之義莫若極尊賢之宜發於外者謂之恭有諸中者謂之敬誠然後能敬未及誠時却須敬而後能誠無妄之謂誠不欺其次矣詩序必是同時一作國史所作然亦有後人添者如白華只是刺幽王其下更解不去綿蠻序不肯飲食教載之只見詩中云飲之食之教之誨之命彼後車謂之載之便云教載絶不成言語也又如高子曰靈星之尸也分明是高子言更何疑文王望至治之道而未之見若曰民雖使至治止由之而已安知聖人二南以天子在上諸侯善化及民安得謂之至其有不合周公之心固無此設若有不合者周公之心必如是勤勞五世依約君子小人在上為政其流澤三四世不已五世而後斬當時門人只知闢楊墨為孟子之功故孟子發此一説以推尊孔子之道言予未得為孔子徒也孔子流澤至此未五世其澤尚在於人予則私善於人而已行之不著如此人多若至論雖孔門中亦有由而不知者又更有不知則不能由送死天下之至重人心茍能竭力盡此一事則可以當天下之大事養生人之常此相對而言若舜曽子養生其心如此又安得不能當大事王者之詩亡雅亡政教號令不及於天下仁言為政者道其所為仁聲民所稱道不得於言勿求於心不可養氣以心為主若言失中心不動亦不妨一言而可以折獄者其由也與言由之見信如此刑法國人尚可信其他可知若臧武仲之知又公綽之不欲卞莊子之勇冉求之藝合此四人之偏文之以禮樂方成聖人則盡之矣先進於禮樂質也後進於禮樂文也文質彬彬然後君子其下則史孔子從之矯枉欲救文之弊然而吾從周此止文一事又有不從處乗殷之輅中庸首先言本人之情性次言學次便言三王酌損成王道餘外更無意三王下到今更無聖人若有時須當作四王王者制作時用先代之宜世者今也法當用周禮自漢以來用有愛人之心然而使民亦有不時處此則至淺言當時治千乗之國若如此時亦可以治矣聖人之言雖至近上下皆通此三句若推其極堯舜之治亦不過此若常人之言近時便即是淺近去齊經管仲霸政之後風俗尚權詐急衣食魯之風俗不如此又仲尼居之當時風俗亦甚美利漢尚言齊魯之學天性只説風俗若謂聖賢則周公自不之魯太公亦未可知又謂齊經田常弑君無君臣上下之分也不然色難形下面有事服勞而言服勞更淺若謂諭父母於道能養志使父母説却與此辭不相合然推其極時養志如曽子大舜可也曽元是曽子之子尚不能在邦而已心無怨孔子發明仲弓使知仁字然舜在家亦怨周公狼跋亦怨當孔子時傳易者支離故言五十以學易言學者謙辭學易可以無大過差易之道惟孔子無大過詩書統言執禮人所執守賢者能逺照故能避一世事其次避地不居亂邦不愧屋漏則心安而體舒子曰君子博學於文約之以禮亦可以弗畔矣夫此非自得也勉而能守也多聞擇其善者而從之多見而識之知之次也以勉中人之學也經所以載道也器所以適用也學經而不知道治器而不適用奚益哉今之學者岐而為三能文者謂之文士談經者泥為講師惟知道者乃儒學也夫内之得有淺深外之來有輕重内重則可以勝外之輕得深則可以見誘之淺師語四獵自謂今無此好周茂叔曰何言之易也但此心潛隠未發一日萌動復如前矣後十二年因見果知未周公不作膳夫庖人匠人事只㑹兼衆有司之所能有田即有民有民即有兵鄉遂皆起兵禪學只到止處無用處無禮義槀鞂大羮鸞刀須用誠相副心要在腔子裏體道少能體即賢盡能體即聖孔子門人善形容聖人堯夫道雖偏駁然巻舒作用極熟又能謹細行虚而不屈動而愈出只外面有些隙罅便走了只學顔子不貳過忠恕違道不逺可謂仁之方力行近乎仁求仁莫近焉仁道難言故止曰近不逺而已茍以力行便為仁則失之矣施諸已而不願亦勿施於人夫子之道忠恕非曽子不能知道之要捨此則不可言聖人之明猶日月不可過也過則不明愚者指東為東指西為西隨衆所見而已知者知東不必為東西不必為西唯聖人明于定分須以東為東以西為西邵堯夫猶空中樓閣兵法逺交近攻須是審行此道只是論得規矩準繩巧則在人莊子有大底意思無禮無本體須要大外面事不患不知只患不見自已人當審已如何不必恤浮議志在浮議則心不在内靜坐獨處不難居廣居應天下為難保民而王今之城郭不為保民事往往急便壞與奪翕張固有此理老子説著便不是孔子弟子少有㑹問者只顔子能問又却終日如愚只理㑹生是如何靜中便有動動中自有靜灑掃應對與佛家黙然處合喪事人所不勉處酒人所困處孔子於中間處之得宜堯舜極聖生朱均瞽鯀極愚生舜禹開物成務有濟時之才禹不矜不伐至柔也然乃見剛九徳最好不學便老而衰不見其大便大職事不可以巧免雍置師内郡養耕外郡禦守兵能聚散為上把得地一作性分定做事直是不得放過韓信多多益辦只是分數明大凡長育人材且須緩緩兵陣須先立定家計然後以遊騎旋旋量力分外面與敵人合此便是合内外之道若遊騎太逺則却歸不得至如聽金鼓聲亦不忘却自家如何如苻堅淝水一敗便不可支持無本故也坐井觀天非天小只被自家入井中被井筒拘束了然井何罪亦何可廢但出井中便見天大已見天如此大不為井所拘却入井中也不害致知但知止於至善為人子止於孝為人父止於慈之類不須外面只務觀物理汎然正如游騎無所歸也即目所學便持吾斯之未能信道著信便是止也晉書謂吾家書籍當盡與之豈止與之當再拜而獻之病昏不為他物所奪只有正氣然猶有力知識逺過於人況吾合天地之道安有不可須是無終日之間違仁即道日益明矣師語五傳不習乎不習而傳與人學則不固連上説有馬者借人乗之吾力猶能補史之闕文當史之職而能闕疑以待後人是猶有馬者借人乗之也能言不怍者難君子義以為質四句只是一事以義為本可使之往不可陷以罔君子矜而不爭矜尚之矜南宫适以禹稷比孔子故夫子不答也果哉末之難矣果敢之果不知更有難事他所未曉輕議聖人孔子擊磬何嘗無心荷蕢於此知之辟世辟言辟色非有優劣只説大小次第靈公問陳孔子遂行言語不相投不占而已有吉凶便占無常之人更不待占三代直道而行毁譽公踐迹如言循途守轍善人雖不循守舊迹亦不能入聖人之室論篤是與言篤實時與君子與色莊魯衞之政兄弟也言相近也知及仁守莊涖動禮為政始末民之於仁甚於水火不肯為仁如蹈水火致逺恐泥不可行逺先傳後倦君子教人有序先傳以小者近者而後教以大者逺者非是先傳以近小而後不教以逺大也吾其為東周乎東遷以後諸侯大夫强僭聖人豈為是乎匏𤓰繫而不食匏𤓰無所為之物繫而不動子樂弟子各盡其誠實不少加飾故孔子知由之不得其死性相近也生質之性小知大受不可以小知君子而可以當大事天下有道丘不與易也其誰以易之誰肯以夫子之道易已所為佛肸召欲往而不往者何也聖人示之以迹子路不諭九夷浮海之類周公謂魯公三句反覆説不獨不施其親又當使大臣不怨至公不可忘私又當全故舊大徳小徳如大節小節雖有周親不如仁人至親不如仁賢因不失其親信本不及義恭本不及禮然信近於義者以言可復也恭近於禮者以逺恥辱也因恭信不失其所親近於禮義故亦可宗也如言禮義不可得見得見恭信者斯可矣子張子夏論交子夏子張告人各有所以初學與成徳者事不同貧與賤不以其道得之不去也不以其道得去貧賤如患得之卿以下必有圭田祭祀之田也禄外之田也餘夫二十五畝一夫上父母下妻子以五口至八口為率受田百畝如有弟是餘夫也俟其成家別受田也㕓而不征市宅之地已有㕓税更不征其物法而不㕓税有常法不以㕓故而厚其税㕓無夫里之布㕓自有税無此二布國有道不變塞所守不變所行不塞廣居正位大道所居者廣所位者正所行者大天下至中至大之所配義與道浩氣已成合道與義道本也義用也集義所生者集衆義而生浩然之氣非義外襲我而取之也師訓問文中子圓者動方者靜先生曰此正倒説了靜體圓動體方問管仲設使當初有必死之理管仲還肯死否曰董仲舒道得好惟仁人正其誼不謀其利明其道不計其功問知崇禮卑曰崇的便是知卑的便是禮問充塞乎天地之間莫是用於天地間無窒礙處否曰此語固好然孟子却是説氣之體因論持其志先生曰只這箇也是私然學者不恁地不得問寢不尸曰毋不敬古者大享夫人有見賓之禮南子雖妾靈公既以夫人處之使孔子見於是時豈得不見天且不違況於鬼神乎鬼神言其功用天言其主宰天下雷行物與无妄先天後天皆合乎天理也人欲則偽矣古人善推其所為而已矣此特告齊宣云爾聖人則不待推仲尼聖人其道大當定哀之時人莫不尊之後弟子各以其所學行異端遂起至孟子不得不辨也嵗寒然後知松柏之後凋只取堅不變之義鼓萬物而不與聖人同憂聖人有為之功天地不宰之功孔子之時周室雖微天下諸侯尚知尊周為美故春秋之法以尊周為本至孟子時七國爭雄而天下不知有周然而生民塗炭諸侯是時能行王道則可以王矣葢王者天下之義主也故孟子所以勸齊之可以王者此也初見先生次日先生復禮因問安下飯食穩便因謂君子食無求飽居無求安顔子簞瓢陋巷不改其樂簞瓢陋巷何足樂葢別有所樂以勝之耳伊川問佛戒殺生之説如何曰儒者有兩説一説天生禽獸本為人食此説不是豈有人為蟣蝨而生耶一説禽獸待人而生殺之則不仁此説亦不然大抵力能勝之者皆可食但君子有不忍之心爾故曰見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也舊先兄嘗見一蝎不忍殺放去頌中有二句云殺之則傷仁放之則害義伊川敬以直内義以方外與徳不孤一也為善者以類應有朋自逺方來充之至於塞乎天地皆不孤也伯夷孟子言其迹得聖人之清孔子言清而有量故曰不念舊惡怨是用希又曰求仁而得仁又何怨若曰餓於首陽之下但不食周粟貧且餓爾非謂不食周粟至于采薇而食之如史遷之説也樂隨風氣至韶則極備若堯之洪水方割四凶未去和有未至也至舜以聖繼聖治之極和之至故韶為備舜巡狩每五載一方仁在已讓不可也若善名在外則不可不讓管仲不死觀其九合諸侯不以兵車乃知其仁也若無此則貪生惜死雖匹夫匹婦之諒亦不若也游廌山集巻三
