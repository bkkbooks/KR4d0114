body:
  text: 游廌山集别集類二宋提要臣等謹案游廌山集四巻宋游酢撰酢字定夫建陽人元豐五年進士建中靖國初厯官監察御史宣和初終於知濠州事蹟具宋史道學傳楊時龜山集有酢墓誌銘稱所著有中庸義一巻易説一巻詩二南義一巻論語孟子雜解各一巻文集十巻年譜稱其年二十九録明道先生語年四十一録伊川先生語年四十六作論孟雜解中庸義年四十七作易説詩二南義而不言文集盖夲各為書也此夲首以論語雜解中庸義孟子雜解為一巻次易説詩二南義為一巻次師語師訓為一巻次以文七篇詩十三首附以墓誌年譜為一巻又中庸義後有拾遺孟子雜解僅八條詩二南義僅二條盖後人掇拾重編不但非其原夲且併非完書矣春日山行詩中有風詠舞雩正此日雪飄伊洛是何年之句自用程門立雪故實似亦不類酢作以其為宋儒遺書别無他本姑録之以備一家焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1b092abbf0e4d2dadc9297f7b2919538e39467699b38517bd9c3d11746eb1f6a
