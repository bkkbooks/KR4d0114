body:
  text: 游豸山集卷二宋游酢撰易說彖曰大哉乾元節乾曰大哉坤曰至哉大則無所不包至則無所不盡乾之大無方而坤則未離乎方也終日乾乾節終日乾乾反復於道也反復宜與復卦之反復同釋終日乾乾行事之時而曰反復道何也蓋君子之行事雖汲汲皇皇而易簡之理未嘗離也亦行其所無事而已九三在下體之上將離人而天矣故有反復道之象若夫聖人作而萬物覩則天德之所為確乎能其事而已矣雖有為而未嘗為反復不容言矣君子體仁節道者天也道為萬物之奧故足以統天仁者人也仁為衆善之首故足以長人猶之萬物發育乎春而震為長子也大為之制經為三百曲為之防詳為三千要皆歸於大中而已故曰嘉㑹足以合禮猶之萬物相見於夏而離為文明也義主於刻制而利不生於其間則不和先王之義勞之乃所以逸之故民至於忘其勞殺之乃所以生之故民至於忘其死蓋利之實行乎其中矣故曰利物足以和義猶之萬物雕悴於秋而說言乎兌也事以智謀物以智創智而不貞則事不立貞者正而固也謀之不正則異議得以屈之守之不固則衆力得以傾之豈事之幹哉故曰貞固足以幹事猶之萬物終藏於冬而成言乎艮也君子行此四德則乾道在我矣故曰乾元亨利貞初九曰潜龍勿用節龍德而隱故不易乎世龍德而正中故曰善世而不伐不易乎世者用舍在我故遁世無悶不成乎名者非譽不在物故不見是而無悶確乎其不可拔則行一不義殺一不辜而得天下不為矣非伯夷桞下惠之徒何足以與此若孔子則聖人之時不專於勿用也其易世之志未嘗一日而忘故曰天下有道丘不與易也乾元用九節揲蓍之法遇九六之數則變乾以純陽故陽極而亢坤以純隂故隂極而戰如其不變則亢而災戰而傷不能免也乾以用九則陽知險而變故無首而吉坤以用六則隂知阻而變故永貞而利乾坤純乎隂陽者也故有用九用六與他卦不同將來者進成功者退天之則也故乾元用九乃見天則君子學以聚之節乾之道不盡於九二故有學問坤之道盛於六二故不習無不利坤坤者純隂之卦也故初六隂生有履霜之戒六四重隂有天地閉之象彖曰至哉坤元至應地無疆乾曰大哉坤曰至哉大則無所不包至則無所不盡乾之大無方而坤則未離乎方也坤順承天則於乾之道亦無餘矣特不出於天之外而已故曰至哉坤元言地道於是為盡也天下之道至於易而盡故曰易其至矣天下之德至於中庸而盡故曰中庸其至矣體易而崇德則日新體易而廣業則富有故曰盛德大業至矣哉其靜也翕故曰含𢎞含言無所不容𢎞言無所不有其動也闢故曰光大光言無所不顯大言無所不被四者坤元之德也體坤德以有行者非君子不足以與此故曰君子攸行天行健者天之不已也無不覆幬者天之無疆而地之持載足以配之故曰德合無疆蓋無疆者以形言也德合無疆者地之配天也應地無疆者君子之法地也知君子攸行應地無疆則知乃順承天之下德合無疆者合乎天也六二直方大節坤之六二靜則為中正動則為直方坤之道盛於六二而直方因動而後見也不言直方則地道之光不可得而見矣故以動者言之天地變化草木蕃節蓋言順也言順於勢也蓋言謹也言順於命也坤至柔而動也剛至靜而德方則用順亦必有所處如齊之田氏魯之三桓晉之六卿其勢之馴致必至於不可解夫胡可以用順耶此初六之堅氷所以明用順之弊也天地閉賢人隱則伏其身而弗見閉其言而不出藏其智而不發唯恐其不謹如鄉鄰有鬪者被髮纓冠而往救之則非所以為謹矣此六四之括囊所以明用順之善也夫順何尤哉順性命之理而已茍順性命之理安往而不善君子黃中節美在其中而暢於四支發於事業則周公其人也故曰公孫碩膚赤舄几几公之大美發於事業者既遜而不處其暢於四支者晬然見於動容周旋皆盛德神明之容不可得而形容也徒見其赤舄几几而已赤舄几几四體不言而喻也黃中通理者養德性之源而通至理也正位居體者正為臣之位而居坤體也通理云者非謂其見彼也自見而已非謂其聞彼也自聞而已故宅於心者至虛而明居體云者處靜而無倡也禀其令而已處順而無作也續其終而已故守其身者至柔而恭內外交相養則美其中粹然無疵矣故見於面盎於背施於四體四體不言而喻此暢於四支所以為美之至也致天下之大利成天下之大順功髙而朝不忌任重而上不疑此發於事業所以為美之至也古之人有體是道者吾於周公見之矣周公既有大美而不居則所可得而形容者道德之氣神明之容而已故曰赤舄几几蓋暢於四支者然也東人欲其留西人欲其歸而名實孚於上下不可掩也故曰德音不瑕蓋發於事業者然也公之碩膚若是而不與有焉則其為美之至可知也坤之六二地逺於君諸侯之位也故言敬以直內義以方外而以其動者言之所以為大也六五地近於君公卿之位也故言黃中通理正位居體而以其靜者言之所以為美也為臣之美於是兩盡彖曰屯節屯宜建侯而不寧何也蓋屯難未解方且急賢才以自助故分土錫圭以報有功而崇有德又且與之戮力以𢎞濟艱難故雖建侯而不寧也若豫之建侯則四方無虞五刑不用要當建諸侯以藩屏王室而已以是建侯則寧矣武王歸馬放牛何不寧之有初九盤桓節夫建侯王者事也而於初九言之者以剛動而不失其正其自任以天下之重蓋王佐才也象所謂君子以經綸者非初九其誰耶故其體國致君宜以協濟為意其曰利建侯者乃代天理物之職也彖曰䝉山下有險至聖功也含德之厚比於赤子抱一不離此䝉以養正之謂也夫唯抱一不離故智雖滿天地而不自慮能雖窮海內而不自為付百職於衆賢而我無為焉其致功也吾不尸其事其成功也吾不處其名此聖人之功也筮者占以决疑也占以决疑無不致誠故易以决疑以謀俱以筮言之非假布䇿也䝉之初筮者致一以有求比之原筮者再思以有擇若夫假爾泰筮則不可以有原也象曰山下出泉節山下出泉其一未散其勢未達觀其勢之未達則果行觀其一之未散則育德初六發䝉節䝉之初六發䝉而利用刑人何也蓋民之迷則目無所見耳無所聞若以物䝉其首也今欲發其䝉而示之以好惡則彼且不見利不勸不威不懲誥令所不能加行義所不能率必欲以利誘之耶則爵無德而祿無功愈非所以勸也故當小懲而大戒罰一以警百然後䝉者畏刑之將至相與從上之所好而避其所惡故其䝉可得而發也雖然有發䝉之志則刑人而為利矣茍惡其䝉而刑之不幾於不教而誅乎故曰利用刑人以正法也正法云者示之以好惡之謂也上九擊䝉節䝉之上九擊䝉若齊之伐燕利其土地重器所謂為寇也若葛伯仇餉而湯往征之所謂禦寇也象曰雲上于天節雲上于天則澤將下流天下之所徯望也故有需之象飲食人之大欲存焉而人非飲食不生則天下之所需莫急於飲食故需飲食之象而位乎天位以應天下之求亦曰需于酒食而已然幅員之衆烏得人人而飲食之哉亦曰養賢以及萬民而已故君子飲食燕樂者大烹以養聖賢使忠臣嘉賔得盡其心焉耳忠臣嘉賔盡其心則小民不失職而人人厭所欲矣九五之所需孰大於此六三食舊德節訟之六三才不稱位故有食舊德之象食舊德者世其祿也世之搆訟者皆出於忿欲而六三才不足則內省而無忮位已髙則知足而無求夫如是則從上而已奚其訟故食舊德而安也然當訟之時才不稱其位則人必媢嫉之者故不能無危要之在已者貞固自守而無爭心故雖危而終吉也九五訟元吉節訟元吉謂聼訟之主也非身有訟也九五得尊位大中以正决天下之訟已則何訟之有當訟之時至而以中正决之是以元吉也若虞芮質厥成文王蹶厥生則聼訟之道孰善於此吉孰大焉故卦言利見大人大人則九五之謂也且訟而有孚猶窒而後通惕而後寧中焉則吉終焉則凶自無元吉之理師貞丈人吉節師貞丈人吉故詩稱方叔元老克壯其猶也老者成德之稱乞其言足以愈人之疾故曰艾憲其行足以助人之善故曰叟其更事多其作謀審其成德也尊其致道也逺蓋朝廷典刑所賴而非特可以行師也丈人者老者之尊稱而法度所資也師之道以律為主故以丈人言之彖曰師衆也至又何咎矣用師之道將以正天下之不正也故師謂之征已不正其能正人乎此師之所以主乎貞也剛中而應任將之道也行險而順興師之義也仰順乎天無違天以干時俯順乎人無咈人以從欲興師之順如此則民之從之雖犯難而忘死矣故能以衆正以衆正之則人皆知其欲正已而已天下孰不趨於正哉其為王也孰禦故吉且無咎六二比之自內至不自失也比之自內者非枉已以外求也上之人訪逮幽側至誠以相與然後出而應之故爻稱自內而象以為不自失也六二居中得正與九五為正應迹逺而志同位殊而德合故以自內言之若伊尹之在莘而湯聘加焉非自內以比耶尹負鼎干湯孰謂聖人乃不知比之自失乎象曰風行天上節風行天上柔㢲之上行也君子觀象於此則美其文德也天以剛健故其事武地以柔順故其事文風之柔無所不入地類也故有文德之象舜之格有苖文德之懿也詩稱仲山甫柔嘉維則令儀令色則所以畜宣王者文德而已矣故有明哲保身之說異乎伊尹之於成湯太甲也上九既雨既處至有所疑也以臣畜君至於和且至則畜道成矣猶當尚德以載之不可以賢臨之也尚德者無所不用德也故象以為德積載何則君臣夫婦人合也人合者易以暌故雖貞而厲若恃此以行而不止則隂疑於陽月盈而逼矣故雖君子之道猶為凶也所謂有疑者隂疑於陽之謂也彖曰履柔履剛也至光明也卦之才則以一柔進退履衆剛故有履虎尾之象然而不嘻人亨者說而應乎乾故也蓋說而已不應乎乾則不敬應乎乾而已非說則不和夫敬以和何事不行君子之所履茍在於是則雖暴人之前無虞矣雖蠻貊之邦行矣况於華夏乎故履虎尾不嘻人而又亨也君子之所履未嘗不在於禮而禮勝則離今至於履虎尾而亨則其他可知矣此履之善也此合一卦之才言之若就一爻之義則六三蹈虎尾而凶矣故爻彖異辭猶之彖言剛中正履帝位而不疚而九五言夬履貞厲也剛中正履帝位而不疚者兌澤下流故也膏澤下於民則貴為天子富有四海而內省不疚矣此天下所以心悅而誠服也天下心悅而誠服則親之若父母仰之若日月敬之如神明畏之如雷霆可不謂光明也乎若其據利勢之重阻法度之威以臨涖天下而澤不加於民則民咨胥怨疾首蹙頞而相告矣夫如是則從之者勢也而心背之事之者貌也而腹非之夫何光明之有象曰上天下澤節天高地下禮制行矣人之所履禮而已故上天下澤有履之象君子觀象於此則可以辨上下上下既辨則名分立而民志定矣此以成卦之體言之也禮者所以辨上下而定民志也蓋上下之分嚴則豐者不為有餘殺者不為不足而民志定此先王因人性以制之而理之不可易也其或強有力者竊其非分而有之欲自以為榮是播其惡適足以發笑而自㸃爾所有者非其分既不足以為榮而身陷不義更足以為辱愚孰甚焉此臧文仲居蔡所以為不智也季氏以八佾舞三家以雍徹正類於此而臧文仲當時名大夫必嘗以智稱故仲尼以為何如其智以明其大者不知其他不足稱也如以為先王之為禮將以籠天下之愚而拘之則荀卿化性起僞之說行矣譬如今人未仕而服青紫人必以為病狂文仲之愚不幸類此初九素履往至獨行願也中庸言君子素其位而行不願乎外蓋位有貴賤得喪而君子不因其位而改其素也履之初言素履亦猶是也素之為言無飾也大行不加窮居不損豈借美於外哉孟子所謂不願人之膏粱文繡者是也履此而往則志之所祈嚮者非有狥乎人也獨行其平昔之志而已故曰獨行願也在履之初未交於物故有素之象六三眇能視至志剛也六三以一隂獨立於羣陽之中而又處非其位故有眇跛之象猶之隂而無匹也眇能視跛能履明不足而行不全也故有武人之象若用此以蹈危其能無傷乎惟武人用此以聼命於大君則處陽而志剛可以有為矣大君剛中正而履帝位者也明足以照理行足以率人故武人聼命而有為可以無虞而有功矣上九視履考祥節視所履之善惡所以考失得之報蓋禍福之來必象其德而還之也在履之上為履道之成在我者無非禮矣故其旋元吉其旋者象其履以還之之謂也象曰天地交泰節財成天地之道猶言燮理隂陽也輔相天地之宜猶言寅亮天地也寅亮者事功之所及如羲和之職是也此體天地交泰之事也至於燮理則非體道之全而與天地相流通者不足以與此此體天地交泰之道也財者節其過也猶言範圍成者補其虧也猶言彌綸範之使有常則日月無薄蝕陵谷無遷易四時常若風雨常均若此者範之者也圍之使無踰則春無凄風秋無苦雨冬無愆陽夏無伏隂若此者圍之者也彌之使不虧其體則覆幬者統元氣持載者統元形陽敷而能生隂肅而能成夫是之謂彌綸之使無失其叙則日月代明寒暑迭運將來者進成功者退夫是之謂綸彖曰否之匪人節比之匪人言所比非其人也否之匪人言致否之因也君臣上下在朝者非其人則將引天下之叨懫姦回萃於朝此所以致否也羣小在上而衆邪逞故不利君子貞當是時非有大人之德則處否而未必亨非有大人之才則不足以休否伊尹五就桀而當時羣小不能害焉非體道忘我孰足以與此以顔子之賢遊於人間世仲尼猶以心齊告之則為君子類者處否之時正當全身逺害而已有國家之道君臣而已傳曰不有君子其能國乎蓋惟君子在朝然後君臣各得其道上下合志而天下之情通此國之所以立也如君不君臣不臣則天下無邦矣猶之父不父子不子則無家矣無邦者其道亡也六二包承至不亂羣也否之六二下乘初六上承六三二隂皆小人之象二不包初則小人蓄忿而陷我矣不承三則小人依勢而藉我矣故曰包承小人吉此言君子之居中守正者全身逺害當如是也若夫至中至正之大人則不然體道虛已以遊人間或不言而飲人以和與人並立而使人化蓋嘗入獸不亂羣矣况於人羣乎故能處否而亨也若伊尹五就桀而羣凶不能以害之是也揚子以不離其羣為聖人蓋知不亂羣之說也六三包羞節六三在下體之上位寖顯矣而當否之世不能去又以隂柔處之是可羞也世之寡亷鮮耻茍賤之士處顯位以播惡於衆而不自知其醜者多矣六三與中正剛明者為鄰則見聞所漸亦知其可羞矣惟以資質隂柔不能行其所知至於忍恥而冒處故謂之包羞九三伏戎於莽節伏戎於莽欲以劫五之下接也升其髙陵欲以扞二之上比也二五以同德合而九三居剛不中不務德而欲以力爭冝其三歲不興也三在下體之上有高陵之象故曰升其高陵其者指三之本體也九四匪其彭節舒王以匪其彭為其旁不知所據何說且近君之位有下比之嫌怨非獨大有之時為然伊川以彭為衆多似于大有為親一說彭有張大之意當大有之勢居近君之位輒據而矜之志于張大則羣賢解體天地鬼神亦且弗祐矣此昧者所以敗也辨晢明之著也六五厥孚交如節大有之成體文明而剛健之主故能以至誠與下而下亦以至誠應之上下合德而無間故曰厥孚交如為大有之主高拱尊位其明不可欺其健不可陵則人之畏之將如神明矣故曰威如吉彼且推赤心置人腹中其胸中坦然無疑忌誰肯用數以御下哉此太平之君子所以易而無備也上九自天祐之吉節六五有至信之德而上履之故有履信之義五為大君而上九與衆陽同體而應之故有思乎順之義上九為明之極而自處無位之地推衆陽而進之故有尚賢之義能如是則無天災物纍無人非鬼責天人交助之冝其吉無不利也自天云者理之必至非有求而得也伊尹將告歸旁求俊乂啓迪後人自不居其成功蓋用此道也又以尚賢者體信順以處已而又以尚賢也彖曰蠱剛上而柔下至天行也飭蠱以有事者不可以有擾故於蠱以先甲後甲言之甲者仁柔也發號施令者不可以狥人故於巽以先庚後庚言之庚者義剛也傳曰通變之謂事事往來終始如循環必至之理也故曰天行君子察於此故先事而豫以弭於未然故能致治於未亂非知幾不足以與此後此而圖以防其將然故能轉凶而為吉非知化不足以與此三日者成數也原始要終亦推其數而已先後至於成數則無虞矣巽而止者飭天下之蠱義主於巽而道貴於止也巽而止則元亨而天下治矣故諸爻皆以家道言之蓋當是時治大宜如小治衆宜如寡治煩宜如簡一切以柔巽自處而無意於動衆順其序而弗擾因其情而無咈如子之任父事則觀聼不駭而害已消矣因便而為之甚易也如欲以發強剛毅勇於作為多所紛更者任是猶治絲而棼之益以壞亂而已非治蠱之道也初六幹父之蠱至意承考也初六才不足以應宜不足以幹蠱而能考無咎者以柔巽為體而意專於承考也意承考者子道之正也故爻稱為有子况夫一家之事固不煩而初亦未廣也持吾承考之意以從事則何事而不濟耶書曰罔曰弗克維既厥心意在于承考斯能盡其心矣人心其神矣乎能盡其心則雖愚必明雖柔必強才之不足非所患也九二幹母之蠱至得中道也九二處多譽之地才有餘而道不失中固衆譽之所歸六五因衆譽而用之則人情莫不悅服彼其才足以任劇而以中道承柔中之君則其君且仰成而繼志述事有餘地矣然譽在下而上不忌者得中道而承以德也九二咸臨吉至未順命也君倡而臣和禮之正也若臨之九二以剛中之才任六五之眷倚則有從道不從君之事矣故象以為未順命至於為上為德而君臣一道則上之所倡豈終不和耶故以未順言之咸臨吉無不利者二與五以同德相與至誠以相應而無私意也其順之實固已見於未命之前矣故曰未順命也猶言未占有孚也六四至臨無咎至位當也臨之六四為至臨者應下而順上守之以正以臨其民則民敬而從之是其為臨也可名為至矣然多懼之地而才不足以有為非若六五知臨之大也故稱無咎而不言吉適當其位而已彖曰大觀在上至天下服矣聖人久於其道而天下化成蓋天下之化非有資於號令之鼓舞也刑賞之懲勸也一於誠而已誠至則天下徯其志而從之如恐不及矣故曰盥而不薦有孚顒若先王之化民豈能拂其所有而與之以所無哉亦曰順以巽而已中正民之性也順其性而入之則將淪肌膚而浹骨髓矣下觀而化自然之理也六三觀我生節六三觀我生進退者省諸已也度德以就位量能以任官也九五觀我生者驗諸民也所以審好惡而察治忽也夫如是則興事造業無過舉矣故無咎此在上位者與德稱而志在民者之所為也故特稱君子以别六三也若夫上九之觀其生則觀其時之施設也此有君子之才而無其位身在畎畝而志常在君者之所為故亦稱君子而象因其有觀以知其志未平也象曰山附于地節山附于地則山頺之象山至于頺則以下不厚而上危故也彖曰復亨剛反至天地之心乎復其見天地之心乎天地之心主於生物復之時未有物而物以陽復而生博愛者聖人之心也復禮未有愛也而博愛之實由復禮而出故序卦曰復則不妄無妄者天命也先王以此茂對時育萬物則於博施濟衆也何有六二不耕穫至未富也無妄之六二不耕而穫不菑而畬以明君子之於物也應而不倡其於事也述而不作非樂通物也樂循理而已矣循理而已則有行有為皆天命也何妄之有焉雖然六二得位矣而非尊位故其勢不得以始事得中矣而非大中故其才不足以創物是故象以為未富若夫通其變使民不倦神而化之使民宜之應時而造以敏成功其為無妄孰大於此大畜利貞節說者以大畜為君畜臣夫賢者易祿而難畜而盛德之士蓋有君不得而臣者恐無畜大賢之理如以為所畜者非盛德之彥則不足以當所尚之賢而非所謂止健也且攬羣材而並用之故重道輕祿者不足以自髙宜莫如堯舜而童牛之牿豶豕之牙徒取于私欲不行豈聖君之盛德曾何健之止乎又以不家食為聖人能養賢以及萬民不待家食而民被其養矣然自古養萬民者藉令不知為政亦無家食之理况大畜尚賢之卦也其畜道之成亦曰何天之衢亨未及言養民也恐不須主此義彖曰大畜剛健至應乎天也柔得位而上下應之小者之畜也古之人有行之者若仲山甫之於宣王是也故詩人稱之曰柔嘉維則又曰衮職有闕惟仲山甫補之剛上而五承之能止健大者之畜也古之人有行之者若伊尹之於太甲是也故髙宗稱之曰先正保衡作我先王則補衮之闕不足道也夫人主之勢固能制利害而擅生殺矣可不謂健已乎非有大人之正德終始惟一者孰能止之昔之辨士蓋有能變亂名實而使其君虛已以聼之至於踈間親新間舊言聼計從無不遂其意者其術智亦足以畜其君矣而君子惡之為其不正耳此大畜所以言其利貞也大人在上則天下利見而野無遺賢矣羣賢畢進則涖天職而食於朝此所謂不家食也羣臣不家食則禮義立而政事修財用足而百志成萬邦咸寧吉孰大焉亦何難之不濟乎故曰利涉大川當是時命有德討有罪無容心焉天理而已矣故曰應乎天也初九有厲節且賢者之畜君亦必有道焉量而後入信而後諫不量而入則將至於失身未信而諫則君必以為謗已故初則有厲而利已九二輿說輹至無尤也二則輿說輹二得中矣有剛中之德有載上之才猶有待而後行非不欲行也道合則從不可則去此中無尤之道也九三良馬逐利艱貞節九二輿說輹至於三位髙而近君矣故良馬逐然世治不輕進國有道不變塞焉故利艱貞猶且日戒曰間吾衛以防其逸力厚而義不行才全而用有序上非我應也而其德同已非上比也而其志合內之畜於已者如此其周外之畜於君者如此其審則安往而不利哉六四童牛之牿節九三良馬逐利艱貞夫然後禁於未發如六四故為童牛而加牿焉格其非心如六五故為豶豕之牙蓋六四純隂而勢順賢者以剛克止之則牿牛之象也六五豶豕節六五柔質而處剛又當尊位質柔則嗜欲易以深處剛則躁競易以逞當大畜之時賢者以大中之道正其大本則豶豕之象也禁於未發故能使之棄所習捐所能而人斯與之矣故有喜格其非心則窒其原矣非特禁未發而已也且幽王之惡大矣而當時大夫欲化其心以畜萬邦則畜君之要正在於格其非心而已故取象於豶豕而無嫌於六五也蓋豕之為象其躁忿足以傷物而賊仁其嗜欲足以伐性而滅義今而窒其原則貪欲之情可化為不求而義不可勝用矣躁忿之質可化為不忮而仁不可勝用矣君仁莫不仁君義莫不義則非特人與之而已天斯祐之矣故有慶上九何天之衢至道大行也畜道之成至於天人交助則賢路自我而四達矣故上九曰何天之衢亨賢路而謂之天衢言陟降之當於天心也彖曰剛上而尚賢則大畜之義主於上九也然崇俊良以列庶位而推轂賢路使天下無家食之賢者上九之任也故其爻以何天之衢為言天下至於無家食之賢則道之大行孰盛於此此大畜所以為先王之盛時也六二顛頤拂經于丘頤至行失類也聖人推言頤之為道以為天地養萬物聖人養賢以及萬民則以上養下頤之正也若在上而反資養於下則於頤為倒置矣此二與四所以俱為顛頤也然二之志在物而四之志在道故曰顛頤而吉而二則征凶也何以知其然耶蓋六二居中得正宜足以自守矣然在下體踈逺而未有祿又動體也宜於處約未能自安故降志以求初初方一意於應四而不答也則又將求其類以趨五五非其應又力不足以自養而何暇養人乎故二為行失類此以知其志之在物也夫自養以有所養養德以需天下之求頤之常理也今至于屈已以求諸人則失理之常矣此二之求于五五之資於上所以俱為拂經也六四顛頤吉至上施光也六二行失類至于六四則其志正矣其位近君矣官尊祿厚足以無求矣而汲汲於應初非好善忘勢又將與賢者共之不能為此若孟獻子之家有友五人焉者近是矣且嗜欲深者其天機淺而士大夫之志或涉于重外則人人得而易之矣今六四之所取重者在此而不在彼則瞻視尊嚴儼然人望而畏之故如虎視耽耽而所欲皆得也欲仁而得仁則無惡於欲矣誰能推咎之哉故四之顛頤乃為上施光此以知其志之在道也六五拂經居貞吉至順以從上也六五履尊位而德不稱德雖不稱位而其富固無敵矣所以不足者非物也乃能親上九之賢委已以聼之亦庶乎有以養萬民矣而六二之有求方且養其私而已此五之拂經所以異於二也雖然六五質柔而止體也喜蹈常畏興事其資然也見善未必明用心未必剛故以之守文以之持正可也若應變以成務則非其任矣蓋疑間一生則危亂之機將不可解故居正則吉而不可涉大川也不可涉大川為六五之君言之也利涉大川為上九之臣言之也使大臣之才如上九足以養天下而人主順以從之其蔑不濟矣此周公復政之後成王所以四征不庭制禮作樂六服承德也上九由頤厲吉節六五居正則吉乃如上九之賢則頤之時所謂養賢以及萬民者皆自我出匹夫匹婦無不與被其澤矣夫然故天下信之衆賢助之人主親見其功業而深知其所存遍知其所為任之必專小人莫得以間之天亦誘其衷矣故其迹雖厲而其理則吉此所以利涉大川而大有慶也夫以身狥國𢎞濟於艱難固大臣之職也詎肯臨危而顧其身哉惟欲善其後以兾成功則亦審其時而已矣若成王未知周公之時則不可涉大川六五是也若周公既見察於成王之後則涉大川而利矣上九是也說者謂以上養下為顛頤是以顛為正矣故用伊川說象曰風自火出節欲齊其家先修其身知風之自也易於家人曰風自火出而君子以言有物行有恆可不謂所自乎彖曰損損下益上至與時偕行損之三陽皆損已者也三隂皆受益者也損已者或資諸物或取諸身資諸物者損上益下如初九是也取諸身者損剛益柔若九二上九是也初九已事遄往至尚合志也損之初九曰已事遄往所謂事者損之事也言損初之實以益四之虛也未事而往則恭敬無實而人未孚後事而緩往則於疾無損而事不濟四之志欲損其疾而初遄往使遄有喜焉故曰尚合志也然損下以益上者或失其節則後難繼故必酌損之九二利貞征凶至中以為志也兌之情說而陽之性好動故損之九二有利貞征凶之戒蓋二既得中矣恐其鋭於有為而失中或至于畔道也由中出者損已與人而已愈多故曰弗損益之而其益無方也六三三人行至三則疑也上之所任者在道故三得於上為得友友者以道言也下之所任者在事故上得於三為得臣臣者以事上言也三人行三隂之象也三隂雖同類而志不一於上則於三反為纍也故曰損一人蓋德二三故也一人行則三與上為正應故曰得其友蓋德惟一故也已之德二三能無疑乎莊子所謂汝何與人偕來之衆者亦言用志之不一也六四損其疾至亦可喜也物之出有限故必酌損之而所益不過亦可喜而已已則有疾初無可喜也因人以去之故曰亦可喜也六五自上祐六四得其友而為上九忘家之臣豈徒損其疾而已哉上九弗損益之節得臣無家謂三之致一也六三益之至固有之也益則吉矣而用凶事者所謂吉人凶其吉也三居下體之上當震動之極不用凶事則髙而危滿而溢矣非固有之道也所謂凶事者必非衣帛冠布抑而損之行恭而用儉所以固有之也三本剛體而以柔居之故有用凶事之象彖曰夬决也節揚于王庭誦言于王也孚號誕告于下也告自邑自近而及逺也夫去小人而播告之修若是其詳何也蓋君子之夬也豈徒夬其人而已固將戮一以懲百使天下皆知惡之不可為如四罪而天下服也然小人之隂慝其慮身甚周其欲害君子之意甚切將欲决之能無疑乎故初則不勝二則惕號三猶有凶也雖然彼以其邪我以吾正彼以其凶我以吾仁又方與羣剛協德盡道以去之其憂不濟乎故其危也乃其所以為光也若夫九五則據利勢操主權其除惡之易如剃莧陸甚易而無危矣然才高而性剛必期於夬夬而後已雖未過中於道為未光也姤女壯節姤女壯巽為長女也女壯則乘陽其極將至于為剝故勿用取女而初六有蹢躅之戒也以其為巽體也故為女壯以其隂之初生也故為羸豕九五以杞包瓜至志不舍命也以杞包瓜者以九二之剛中包初六之柔脆用賢得民之象也用賢得民則我無為也中心守至正而已故曰含章若是者天實臨之降之百祥將不旋踵矣故曰有隕自天蓋明君之於天下安危利害不惑其心居中守正強為善以俟之所以作元命也故曰志不舍命九二井谷射鮒至無與也井道以髙潔為體以上出為功故初為井泥二為井谷射鮒蓋其自處汙下而功用熄矣然九二既得中而有趨下之汙何也蓋所居不正則用心不剛又巽體也而上無應故甘心於趨下而不自振其德之地不足稱也上六井收勿幕節井之上六則井既清矣無泄也既完矣無甃也既食矣無求也井道之成無所事矣故曰井收收者集其成功之謂也成則如之何亦博施濟衆而已故曰勿幕易與天地凖節彌之使不虧其體則覆幬者統元氣持載者統元形陽敷而能生隂肅而能成夫是之謂彌綸之使無失其叙則日月代明寒暑迭運將來者進成功者退夫是之謂綸範圍天地之化節範之使有常則日月無薄食陵谷無遷易四時常若風雨常均若此者範之者也圍之使無踰則春無凄風秋無苦雨冬無愆陽夏無伏隂若此者圍之者也或曰伊川序易曰隨時變易以從道然則易與道為二乎曰神無方而易無體易者道之用也既已涉於用矣且得無從乎惟其變易而不離於道斯可名於無體矣若春作夏長秋斂冬藏皆神之所為也神之所為異於人為者以其從道而已此四時之所以不忒也老子曰道法自然亦即人所見以明道也先生之意正欲使學易者知變易之必從道則用不詭於易矣子曰知變化之道節春作夏長秋斂冬藏皆神之所為也神之所為異於人為者以其從道而已此四時所以不忒也是故夫象聖人有以見天下之賾至存乎德行非思非慮非視非聼了然遺照而獨存者神而明之之謂也神存而明之非有心之所能知也此道之所以明無處無出無從無違確乎其能事者默而成之之謂也性默而成之非有為之所能得也此道之所以行游豸山集卷二
