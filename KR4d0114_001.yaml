body:
  text: 游廌山集卷一宋游酢撰論語雜解學而時習之章理也義也人心之所同然也學問之道無他求其心所同然者而已學而時習之則心之所同然者得矣此其所以說也故曰理義之說我心猶芻豢之説我口今試以吾平居之學驗之若時習於禮則外貎無斯須不莊不敬時習於樂則中心無斯須不和不樂無斯須不莊不敬則慢易之心無自而入而本心之敬得矣無斯須不和不樂則鄙詐之心無自而入而本心之和得矣時習之則時有得矣時有得矣其為説可勝計哉流水之為物也不盈科不行君子之志於道也不成章不逹故積於中者厚然後發於外者廣得於已者全然後信於人者周有朋自逺方來則發於外者既已廣信於人者既已周矣非夫積厚於中得全於已者曷至是哉此其所以樂也孟子曰令聞廣譽施於身所以不願人之文繡也夫聞譽施諸身則美在其中而暢於四支夫豈借美於外哉惟不借美於外則志願在我而世之所可願者屏焉其為樂也烏可已耶盖君子非樂於朋來也樂其聞譽有以致之也非樂其聞譽也樂其美在其中而暢於四支有以致聞譽也然求為可樂者亦反諸身而已矣不知命無以為君子也盖不知命則行險以儌幸將無所不至其趨於小人也孰禦焉尚何以為君子乎若夫尊德樂義之士囂囂自得不怨天不尤人遯世無悶不見是而無悶非君子成德孰能至於是哉故曰人不知而不慍不亦君子乎語成德也不然不念舊惡怨是用希與夫遺佚而不怨阨窮而不憫者何以稱夷惠説也樂也君子也言其義則然若夫所以説樂所以為君子則在於學者之心得譬之飲食之美也借使易牙日譽於前而已不預饗焉終不足以知味又曰時習於禮則外貎無斯須不莊不敬時習於樂則中心無斯須不和不樂且將日進於理義之地矣故説内足以成已外足以成物君子所謂三樂者内外两得矣故樂學而至於樂則在我者無憾矣宜其令聞廣譽四馳也而人有不知焉是有命也不知命無以為君子也今也人不知而不慍則非成德之士安於義命者不能爾也謂之君子其爲人也孝弟章事親孝故忠可移於君事兄弟故順可移於長孝弟者忠順之資也其不足於忠順者寡矣故孝弟之人鮮好犯上至於不好犯上則忠順足於已而悖逆之氣不萌於中矣若是者其事君必如其親憂國必如其家愛民必如其子固足以禦亂矣曾何作亂之有故曰不好犯上而好作亂者未之有也木漸於上水漸於下有本者如是故君子之道亦務本而已矣孝弟也者置之而塞乎天地溥之而横乎四海仁此者為仁履此者為禮宜此者為義信此者為信順此者為樂兹非仁之本與知孝弟為仁之本則本立而道生之説見矣巧言令色章仁者誠而已矣無偽也何有於巧言仁者敬而已矣無謟也何有於令色巧言入於偽令色歸於謟其資與木訥反矣宜其鮮於仁也使斯人之志在於巧言令色而已則孔子所謂朽木糞墻孟子所謂鄉原終不可以入德使其人之志在於善而失其所習則猶可以自反此聖人所以不絶其為仁而止言其鮮也然則仲尼之惡令色也如此而詩人以美仲山甫何也盖詩人之所謂令色者與仲尼之意異善觀詩者以意逆志可也吾日三省吾身章考曾子之學主於誠身則其操心宜無不忠其立行宜無不信而處已者無憾矣慮其所以接人者或入於不忠不信而不自悟也故日三省其身焉省之如此其周則有不善未嘗不知知之未嘗復行者庻乎可以企及矣然此特曾子之省身者而已若夫學者之所省又不止此事親有不足於孝事長有不足於敬歟行或愧於心而言或浮於行歟慾有所未窒而忿有所未懲歟推是類而日省之則曾子之誠身庻乎可以跂及矣古之人所謂夜以計過無憾而後即安者亦曾子之意曾子於正心誠意之道宜無須臾忌也惟以應物之際恐或失念而違仁故日所省者三事而已道千乘之國章道之為言未及治也猶書所謂引飬引恬而已馬融謂為之政敎者近之矣敬事而信德敎以道之也節用而愛人使民以時政事以道之也有德敎以道之則尊君親上之心篤有政事以道之則勸功樂事之意純有國之道何以加此盖惟敬朝覲之事則君臣嚴敬冠昏之事則男女别敬喪紀之事則民知哀死而愼終敬祭祀之事則民知報本而追逺事之所在無所不用其敬焉則民孰有不敬者哉一號令之出也一期㑹之時也一賞罰之用也一嚬笑之形也無所不用其信焉則民其有不信者哉由是道而誠於心則有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之者亦久於斯道而已雖然知敬事而已未及乎信則慢令而致期非所以孚民知信而已未及乎節用則侈費而傷財非所以裕國知節用而已未及於愛人則將吝細而少恩非所以厚下知愛人而已不知使民以時則將輕用其力輕奪其務非所以養民知是五者而法度加焉則治人之道足矣當孔子時斯道也將亡矣故亟言之使道之以道則於法度乎何有弟子入則孝章入孝而出弟行謹而言信處衆而汎愛交友而親仁君子之務此其本也有所未能則勉為之有所未至則力致之待其有餘也然後從事於文則其文足以増美質矣猶木之有本根也然後枝葉為之庇覆茍其無本則枝葉安所附哉夫文者詩書禮樂之謂也詩者言此情而已書者述此事而已禮者體此而已樂者樂此而已使其孝不稱於宗族其弟不稱於鄉黨交遊不稱其信醜夷不稱其和仁賢不稱其智則其文適足以滅質其博適足以溺心以為禽犢者有之以資發塜者有之託真以酬偽餙姦言以濟利心者徃徃而是也然則無本而學文盖不若無文之愈也是以聖人必待行有餘力然後許之以學文不然固有所未暇也後之君子稍渉文義則沾沾自喜謂天下之美盡在於是或訾其無行則驁然不顧或詆其不足則忿疾如深讐亦可謂失羞惡之心矣烏知聖人之本末哉賢賢易色章天下之逹道五君臣也父子也夫婦也昆弟也朋友之交也先王之時在上者舍是無以敎在下者舍是無以學故孟子曰學則三代共之皆所以明人倫也今能賢賢易色事父母能竭其力事君能致其身與朋友交言而有信則其於人倫厚矣學之為道何以加此雖曰未學吾必謂之學矣仲尼之門子夏以文學名而其言如此則知古之所謂學者在本而不在末故學而一篇大抵皆在於務本君子不重章正其衣冠尊其瞻視儼然人望而畏之此君子之重而威也重而威則德性尊矣故君子日就小人日逺由是而學其思之必精其行之必篤其問之必周其聽之必專入乎耳著乎心此德全而學固矣反是則言招憂行招辱貌招淫好招辜何威之有道聽而塗說者有之一心以為有鴻鵠將至者有之何固之有忠信所以進德也如甘之受和白之受采故善學者其心以忠信為主不言則已言而必忠信也故其言為德言不行則已行而必忠信也故其行為德行止而思動而為無時而不在是焉則安徃而非進德哉故為仁不主於忠信則仁必出於姑息為義不主於忠信則義必出於矯抗操是心以徃則禮必出於足恭智必出於行險安徃而非敗德哉而何進德之有焉譬之欲立數仭之墻而浮埃聚沫以為基亦没世不能立矣故主忠信者學者之要言也孟子之論尚友也以一鄉之善士為未足而求之一國以一國之善士為未足而求之天下以天下之善士為未足而求之古人無友不如已者尚友之道也求得賢者尚而友之則聞其所未聞見其所未見而德日起矣此仲尼所以期子夏之日進也孔子曰過而能改善莫大焉盖能改一言之過則一言善矣能改一行之過則一行善矣若過而每不憚改者其為善可勝計哉然則君子之道以威重為質而以學成之學之道必以忠信為主而以勝已者輔之雖然使其或吝於改過則賢者未必樂告以善道故以過則勿憚改為終焉愼終追逺章終者人所易忽也而愼之逺者人所易忘也而追之厚之道也父在觀其志章三年無改於父之道若堯舜文武之道雖行萬世不可改也何止三年若武帝𣙜酤之政德宗宮市之事昭帝順宗不踰年而改之天下後世不以為非者何待三年今言無改於父之道則在所當改而可以未改也人君士大夫皆當如此居䘮之制有不言而事行者有言而後事行者有身自執事而後行者此尊卑之等也如以為聽於冡宰為嫌於改父之道則孔子所謂古之人皆然者豈為其父皆有可改之道乎盖闕恤之道當然君子不器章形而上者謂之道形而下者謂之器君子體夫道者也故不器不器則能圓能方能柔能剛非執方者所與也學而不思章多識前言徃行而考古以騐今者學也耳目不交於物而悉心以自求者思也思則知敬以直内而中有主學則知義以方外而外有主學而不思則所學者不能以為已故㒺罔者反求諸已而無實也思而不學則所思者不足以渉事故殆殆者應於事而不安也子張學干禄章行於已而為行故愼行則寡悔悔在心也應於物而有言故愼言則寡尤尤在事也易之言無悔者本諸心也故於行已者言寡悔言無尤者渉於事也故於應物者言寡尤咸同人復大壯無悔賁鼎蹇旅大畜無尤非謂言可以有悔也人而無信章人而無信以輗軏為喻何也曰忠信所以進德而義也禮也以信成之人而無信則中無所主矣以之為仁則蹩躠而已以之為義則踶跂而已為智則誣為禮則偽無所施而可也輗軏大車小車所恃以行者也而有信則大德小德所資以進也故輪輿雖備而無輗軏則有車之名而無運行之實人而無信則雖居之似忠信行之似亷潔終不可入堯舜之道故其喻如此孔子謂季氏章人臣僭國君之禮是無君也陪臣僭天子之禮是無王也季氏以八佾舞其心遂無王矣是將㧞本塞源冠履倒施滅天理而壞人倫矣此而可忍孰不可忍也人而不仁章人而不仁則人心亡矣以事父必不孝其如父子之禮何以事君必不忠其如君臣之禮何在宗廟之中上下同聽之而和敬彼且不敬其如宗廟之樂何在族黨之中長㓜同聽之而和順彼且不順其如族黨之樂何是其為禮也必偽而慢易之心入之矣豈足以治躬其為樂必淫而鄙詐之心入之矣豈足以治心或問禘之説章祭祀之義非精義不足以究其説非體道不足以致其義盖惟聖人為能饗帝為其盡人道而與帝同德惟孝子為能饗親為其盡子道而與親同心也仁孝之至通乎神明而神祗祖考安樂之則於郊社之禮禘嘗之義始可以言明矣夫如是則於為天下國家也何有宜乎衆人所不得聞也故或問禘之説孔子答之曰不知也其曰知其説者之於天下其如示諸斯乎指其掌則又以明其不可不知也是禮也中庸兼郊社禘嘗言之其説亦當如此古人之所謂通乎一萬事畢也論語特因或人之問而發之故止及禘之説耳成王自謂予冲子夙夜毖祀盖雝雝在宫肅肅在廟者文王純德之容而曾孫篤之所以致太平也若言禘大禮其義衆恐非其質也恐與中庸意異關睢樂而不淫章常情之哀樂皆出於私意故其樂必淫於已其哀必傷於人關睢之樂在於得淑女則異乎人之樂也故不淫其色其哀在於思賢才則異乎人之哀也故無傷善之心先王之用心憂樂以天下而已故太姒所以宜為文王之配子謂韶盡美矣章王者功成作樂韶武之盡美以其功言之也如觀其成功則二聖人之樂皆無餘美乃若所遇之事所以致功者舜以紹堯而為韶武以滅商而為武豈可同日而語哉觀成湯之有慚德則武之用心可知矣故盡美者其功也未盡善者其事也猶之周公東征四國是皇是時周室幾再造矣其功顧不大哉至於致辟管叔於商豈其所欲乎武之未盡善其事類如此矣惟仁者能好人章好善而惡惡天下之同情也然好惡每失其實者心有所繫而不能克已也惟仁者宅心於大中至正之地而無私焉故好惡非我遵王之道路而已知及之仁或未足以守之則不足以與此故言唯仁者為能富與貴章富與貴非其道得之則君子不處以有義也君子宜富貴者也今至於貧賤是不以其道得之也然而不去者以有命也此皆為君子言之故主彌子瑕而得卿孔子不為也又曰君子去仁則君非君子非子矣安所成其名又曰無終食之間違仁言造次顛沛必依於仁雖終食之頃不違也如以飲食必有祭則僧家出生皆可以為不違仁矣可騐其學不在已參乎吾道一以貫之章夫道一而已矣天地一指也萬物一馬也無徃而非一此至人所以無已豈參彼已所能預哉此忠恕所以違道為其未能一以貫之也雖然忠所以盡已恕所以盡物則欲求人道者宜莫近於此此忠恕所以違道不逺也子曰參乎吾道一以貫之曾子曰唯使曾子之知不足以及此則仲尼不以告而曾子不自誣今曰忠恕而已者所以告門人也孟子曰萬物皆備於我矣反身而誠樂莫大焉此仲尼告曾子之道也强恕而行求仁莫近焉此曾子告門人之道也然則曾子豈有隠於是耶盖門人智不足以及此而强告之適足以滋其惑使門人誠於忠恕則於一道亦何逺之有子曰吾與回言終日不違如愚又曰語之而不惰又曰於吾言無所不説則其師資之際朝夕相與言而黙契於道者宜不少矣而論語所載止於問為仁問為邦而已則其所不載者皆二三子所不得聞也由此觀之則仲尼曾子所以授受者門人所不得聞而所以告門人者不過忠恕而已此曾子所以爲善學而善教者也夫子之文章章孟子曰仁之於父子義之於君臣至聖之於天道命也有性焉君子不謂命也論性之妙而與於天道雖聖人有所不能知焉况子貢乎聞即是知可得而聞者可以與知之謂也不可得而聞者亦有所不能知之謂也顔淵季路侍章孔子之道修於家行於鄉施於國達於天下亦不過使老者安之朋友信之少者懷之而已盖使天下之為子者皆致其孝然後老者莫不安之矣使天下之為父者皆致其慈然後少者莫不懷之矣使天下之為朋友者皆先施之然後朋友莫不信之矣此所以為孔子之志其辭雖若自抑而非盛德之善治於人心者亦不足以與此仲弓問子桑伯子節子桑伯子之可也以其簡若主之以敬而行之則簡為善哀公問弟子章不遷怒者怒適其可而止無溢怒之氣也傳所謂室於怒而市於色者遷其怒之甚者也不遷怒則發而中節矣喜怒哀樂不可無也每思要發皆中節之為難耳文武一怒而安天下之民則何惡於怒哉記曰心有所忿懥則不得其正今至於不遷怒則於正心之學可謂自强矣不貳過者一念少差而覺之早不復見之行事也盖惟聖人能寂然不動故無過顔子能非禮勿動而已故或有不善始萌於中而不及復行是其過在心而行不貳焉則於修身之學可謂自強矣正心以修身自強而不息此孔子所謂好學而顔子所以三月不違仁也若夫絶學者則心無所於正身無所於修暖然似春凄然似秋天德而已矣此聖賢之辨也子華使於齊章餼廩稱事所以食功也今原思之為宰而辭禄不受則食功之義廢矣盖義所當得則雖萬鍾不害其為亷借使有餘猶可以及鄰里鄉黨盖鄰里鄉黨有相賙之義回也其心三月不違仁章仁人心也不可須臾離也猶飢之於食渇之於飲一日闕之則必顛仆餓踣而殞命矣人心一日不依於仁則不足以為人焉仲尼嘗歎曰有能一日用其力於仁矣乎當時之人不能一日用其力於行仁又安得以仁存心三月之久如顔子哉違者對依而言之不違則心常依於仁矣賢哉回也章非樂簞瓢陋巷也不以貧寠動其心改其樂也知其所樂則知其不改人之生也直章直者循理之謂也惟其循理故能盡生之經與直養之直同至於姦㒺則去直也逺矣知者樂水章仁者安仁得於所性之妙不逐末以忘本不逐偽以䘮真不殘生以傷性可以保身可以養生可以盡年故享年享國皆可長久若堯舜文王皆度越百嵗是也齊一變章齊雖强大經威公一變而為霸則王道不復存焉魯雖削弱而周公之法則猶在有王者作取法於魯則文武之道翕然丕變矣志於道章志於道者念念不忘於道也念念不忘則將有以宅心矣宅心於道者無思也惟精也無為也惟一也惟精則無偏此道之大中惟一則無變此道之大常堯授舜舜授禹至於允執厥中則志於道之效也據於德者止其所而自得也自得於已無待於外則有以勝物而其固萬物莫足以傾之獨立不懼而其守舉世莫得以易之則所據之地可謂之闕且乆矣孟子所謂富貴不能淫貧賤不能移威武不能屈則據於德之效也據於德所以體道也依於仁出入起居視聽食息無時而違仁也仁者人也人之成位乎天地之間以其仁而已不然則皇皇然無所依矣猶之父者子之天也而子依之夫者妻之天也而妻依之不得而違也君子依乎中庸亦若是而已為中庸之不可須臾離也依者違之反也顔子三月不違仁則依於仁之效也依於仁所以成德也義宜此者也禮體此者也智知此者也故曰人而不仁如禮何人而不仁如樂何是故君子依於仁而足矣非謂倚一偏也孰謂三月不違仁而又不足於義乎道者天也故言志德者地也故言據仁者人也故言依至於游於藝則所以閑邪也盖士志於道茍未至於縱心則必有息游之學焉傳曰張而不弛文武不能也不有博奕者乎為之猶賢乎已夫博奕固惡矣而其惡止於博奕若飽食終日無所用心則心之放逸熱焦火而寒凝氷何所不至哉是以聖人寧取於博奕也况六藝之正乎故游於禮所以防其躁也游於樂所以𨗳其和也游於射所以正内志而直外體也御也書也數也亦若是而已是皆操心之術也先王之時自㓜子常示母誑六嵗學方名十年學㓜儀十三舞勺成童舞象以至於灑掃應對進退無非學者庸詎知大人不失赤子之心不緣是而得乎故游於藝所以守仁也本末内外交進而不遺則於宅心而執厥中亦何患於弗克哉子不語章夫子語治而不語亂何也君子樂道人之善惡稱人之惡則語治而不語亂者聖人之仁也且語治而已則是非美惡較然明矣何必語亂而後可以為戒二三子以我爲隱乎章聖人語黙動静無非敎者其所以與二三子者甚易知而易見也惟其聽之者自不能見則以為有隱耳其曰是丘也者質諸已以實其言也故曰天何言哉四時行焉百物生焉聖人亦天而已矣子貢曰夫子之言性與天道不可得而聞也是性與天道仲尼固嘗言之曷嘗有甚高不可測之論大而無當不近人情乎蓋亦不離於文章也而學者自不能以心契則或疑其未嘗言耳子貢既聞道矣故知夫子之未嘗不言也子路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死盖能盡人之道則於事鬼神之道可以不學而能也能知生之説則於死之説可不問而知也告人之道於是乎盡孰謂夫子有隱於由乎興於詩章興於詩言學詩者可以感發於善心也如觀天保之詩則君臣之義修矣觀常棣之詩則兄弟之愛篤矣觀伐木之詩則朋友之交親矣觀闗睢鵲巢之風則夫婦之經正矣昔王襃有至性而弟子至於廢講蓼莪則詩之興發善心於此可見矣而以攷其言之文為興於詩則所求於詩者外矣非所謂可以興也然則不學詩無以言何也盖詩之情出於溫柔敦厚而其言如之言者心聲也不得其心斯不得於言矣仲尼之敎伯魚固將使之興於詩而得詩人之志也得其心斯得其所以言而出言有章矣豈徒攷其文而已哉詩之為言發乎情也其持心也厚其望人也輕其辭婉其氣平所謂入人也深其要歸必止乎禮義有君臣之義焉有父子之倫焉和樂而不淫怨誹而不亂所謂發言為詩故可以化天下而師後世學者茍得其用心何患其不能言哉又曰明乎齊之音者有勇明乎商之音者有義亦感發之意又曰詩之文盖有後世老師宿儒所不能為曾謂始學者而能之乎民可使由之章夫先王豈以其術智籠天下之民而愚之哉盖道無方也反而觀之則無已泛而觀之則無物虎豹得之而猛噬蛇虺得之而毒螫厚者見之而為仁薄者見之而為惡觀老子之學變而為申韓則民不可使知之理可見矣盖其氣質或不良而竊窺其端倪則適足以逞其不肖之心而已此小人之童觀所以无咎也吾自衛反魯章雅頌各得其所而不及禮與風何也曰有其德無其位不敢作禮樂焉則禮樂非孔子之事所謂雅頌各得其所者因其舊而正之非有所作也故不及禮闗睢之亂師摯固嘗治之矣故不及風語之而不惰者章上士聞道勤而行之回於夫子之言無所不説非不惰而何顔淵問仁章孟子曰仁人心也則仁之為言得其本心而已心之本體則喜怒哀樂之未發者是也惟其狥已之私則汩於忿慾而人道熄矣誠能勝人心之私以還道心之公則將視人如已視物如人而心之本體見矣自此而親親自此而仁民自此而愛物皆其本心隨物而見者然也故曰克已復禮為仁禮者性之中也且心之本體一而已矣非事事而為之物物而愛之又非積日累月而後可至也一日反本復常則萬物一體無適而非仁矣故曰一日克已復禮天下歸仁焉天下歸仁取足於身而已非有藉於外也故曰為仁由已而由人乎哉顔淵請事斯語至於非禮勿動則不離於中其誠不息而可久矣故能三月不違仁雖然三月不違者其心猶有所操也至於中心安仁則縱目之所視更無亂色縱耳之所聽更無姦聲無思也無為也寂然不動感而遂通天下之故則發育萬物彌綸天地而何克已復禮三月不違之足言哉此聖人之能事而對時育萬物者所以博施濟衆也仁至於此則仲尼所不敢居而且罕言也然則仁與聖烏乎辨曰仁人心也操之則為賢縱之則為聖茍未至於縱心則於博施濟衆未能無數數然也仲弓問仁章出門如見大賔使民如承大祭則以閑邪存其誠而已出門如見大賔則無時而不敬也使民如承大祭則無事而不敬也仲弓能請事斯語則於非禮勿動亦庶㡬焉司馬牛問仁章仁之難成久矣豈惟行之為難知之固未易也今欲言出而當於仁得無難乎故曰其言也訒訒之難也夫子答樊遲之問仁曰先難而後獲答司馬牛曰仁者其言也訒皆未可與言仁故也吾之於人也章大公至正之道古今所共由也合乎此則為是外乎此則為非其所謂是者非惟聖人之所是天下亦以為是而好之其所謂非者非惟聖人之所非天下亦以為非而惡之聖人因民心之是非好惡還以治之非故矯揉其性而為不可順從之事也三代之君所以治者如此孔子亦出乎大公至正之道而已唯上知與下愚不移章孔子之言性有以其本言之者若繼之者善成之者性是也有以人所見言之者若性相近習相逺是也孟子亦然其道性善深探其本也其曰孺子將入井皆有怵惕惻隠之心乃若其情則可以為善矣姑據人所見而語之也是以當時學者不能無疑夫道未始有名感於物而出則善之名立矣託於物而生則性之名立矣善者性之德故莊子曰物得以生謂之德性者善之資也故莊子曰形體保神謂之性盖道之在天地則播五行於四時百物生焉無非善者也無惡也故曰繼之者善也道之在人則出作而入息渇飲而飢食無非性者也無妄也茍得其性之本然反身而誠則天地萬物之理得而道自我成矣故曰成之者性也惟其同出於一氣而氣之所値有全有偏有邪有正有粹有駁有厚有薄然後有上智下愚中人之不同也猶之大塊噫氣其名為風風之所出無異氣也而叱者吸者呌者號者其聲若是不同以其所託者物物殊形耳其聲之不同而謂有異風可乎孟子謂性善正類此也荀卿言性惡揚雄言人之性善惡混韓愈言性有三品蓋皆蔽於末流而不知其本也觀五方之民剛柔輕重遲速異齊則氣之所禀可以類推之也以堯為君而有丹朱以瞽瞍為父而有舜又何足疑乎孔子言性相近者以習而相逺則天下之性或相倍蓰者固多矣由是觀之則謂性有三品未為不可唯其止以是為性則三子者之失也成性存存道義之門盖非盡心知性者不足以與此宜乎夫子之言性門人莫得而聞也子貢知道者也得其所以言矣故其贊聖人者及此子之武城章子夏以灑掃應對進退敎人子游以弦歌為學知此然後知古人為學之方惟賢者得其大者不賢者得其小者故有愛人易使之異㣲子去之章董子曰仁人者正其誼不謀其利明其道不計其功善乎其言始可與言仁也已矣蓋仁人之用心惟仁所在而已仁之所在則從之不論所以也仁在於去則去之而不愧㣲子是也仁在於不去則為之奴而不辱箕子是也仁在於死則就死而不悔比干是也豈顧利害禍福而易其求仁之志哉故伯夷之清伊尹之任桞下惠之和皆仁也伯夷辭為孤竹之君而餓於首陽之下由衆人觀之其利害固殊絶也而彼獨以是求仁焉以是求之以是得之既以遂其志矣夫何怨之有宰我曰仁者雖告之曰井有仁焉其從之也宰我之意盖曰仁者之志惟求仁而已功利非所計也井者必死之地也厥或告之曰死地有仁彼其用心之誠亦將從之也是不然君子之求仁亦曰循理而已矣夫理之所不載安在其為仁耶故可逝者其心也其不可䧟者其理也以其用心之仁故可以欺以其見理之明故不可㒺以井為言則犯害之地皆是也堯曰咨爾舜章有一言而足以盡至治之要曰中而已盖中者天下之大本也豈執一云乎哉不偏不倚適當其可而已譬之權衡之應物曾無心於輕重抑揚高下稱物平施無銖两之差此其所以為時中也與堯舜禹三聖授受之際所守者一道允執厥中乃傳心之密㫖也中庸義天命之謂性節惟皇上帝降衷於下民則天命也若遁天背情則非性矣天之所以命萬物者道也而性者具道以生也因其性之固然而無容私焉則道在我矣夫道不可擅而有也固將與天下共之故修禮以示之中修樂以導之和此修道之謂敎也或蔽於天或蔽於人為我至於無君兼愛至於無父則非敎矣知天命之謂性則孟子性善之説可見矣或曰性惡或曰善惡混或曰有三品皆非知天命者也君子中庸章道之體無偏而其用則通而不窮無偏中也不窮庸也以性情言之則為中和以德行言之則為中庸其實一道也君子者道中庸之實也小人則竊中庸之名而實背之是中庸之賊也故曰反中庸道之不行也章知出於知性然後可與有行知者過之非知性也故知之過而行之不至也已則不行其能行於天下乎若鄒衍之談天公孫龍之詭辨是知之過也愚者又不足以與此此道之所以不行也行出於循理然後可與有明賢者過之非循理也故行之過而知之不至也已則不知其能明於天下乎若楊氏為我墨氏兼愛是行之過也不肖者又不足以與此此道之所以不明也道不違物存乎人者日用而不知耳故以飲食况之飲食而知味非自外得也亦反諸身以自得之而已夫行道必自致知始使知道如知味斯道其憂不行乎今也鮮能知味此道之所以不行也回之爲人也章道之不行知者過之如舜之知則道之所以行也道之不明賢者過之如回之賢則道之所以明也又曰擇乎中庸見善明也得一善則服膺不失用心剛也子路問强章中庸之道造次顛沛之不可違惟自强不息者為能守之故以子路問强次顔淵君子之道四節有所不足不敢不勉將以踐言也則其行顧言矣有餘不敢盡耻躬之不逮也則其言顧行矣言行相顧則於心無餒故曰胡不慥慥爾慥慥心之實也君子素其位而行章素其位而行者即其位而道行乎其中若其素然也舜之飯糗茹草若將終身此非素貧賤而道行乎貧賤不能然也及其為天子被袗衣鼓琴若固有之此非素富貴而道行乎富貴不能然也飯糗袗衣其位雖不同而此道之行一也至於夷狄患難亦若此而已道無不行則無入而不自得矣盖道之在天下不以易世而有存亡故無古今則君子之行道不以易地而有加損故無得䘮至於在上位不陵下知富貴之非泰也在下位不援上知貧賤之非約也此惟正已而不求於人者能之故能上不怨天下不尤人盖君子為能循理故居易以俟命居易未必不得也故窮通皆好小人反是故行險以儌幸行險未必常得也故窮通皆醜學者要當篤信而已射有似乎君子者射者發而不中則必反而求其不中之因意者志未正邪體未直邪持弓矢而未審固邪然而不中者寡矣君子之正身亦若此也愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已而已而何怨天尤人之有哉失諸正鵠者行有不得之况也舜其大孝也與章中庸以人倫為主故以孝德言之無憂者章武王之事非聖人所欲為也故曰壹戎衣而有天下身不失天下之顯名謂之不失則與必得異矣乃如其道則尊為天子富有四海之内宗廟享之子孫保之與舜未始不同也又曰武王於泰誓三篇稱文王為文考至武成而柴望然後稱文考為文王仍稱其祖為太王王季然則周公追王太王王季者乃文王之德武王之志也故曰成文武之德不言文王者武王既追王矣武王既追王而不及太王王季以其末受命而其序有未暇也禮記大傳載牧野之奠追王太王亶父王季歴文王昌亦據武成之書以明追王之意出於武王也世之説者因中庸無追王文王之文遂以謂文王自稱王豈未嘗考泰誓武成之書乎君臣之分猶天尊地卑紂未可去而文王稱王是二天子也服事商之道固如是耶書所謂九年大統未集者後世以虞芮質厥成為文王受命之始故也當六國時秦固以長雄天下而周之位號㣲矣辛垣衍欲帝秦魯仲連以片言折之衍不敢復出口蓋名分之嚴如此故以曹操之英雄逡廵於獻帝之末而不得逞彼盖知利害之實也曾謂至德如文王一言一動順帝之則而反盗虛名而拂天理乎且武王觀政於商而須假之五年非偽為也使紂一日有悛心則武王當與天下共尊之必無牧野之事然則文王已稱之名將安所歸乎此天下之大戒故不得不辨亦所以正人心也武王周公其逹孝矣乎章大孝聖人之絶德也逹孝天下之通道也要其為人倫之至則一也故繼志述事之末亦曰孝之至也事死如事生以愼終者言之事亡如事存以追逺者言之故始死謂之死既葬則曰反而亡焉此死亡之辨也惟聖人為能饗帝孝子為能饗親饗帝一德也饗親一心也要不過乎物而已其於慶賞刑威乎何有故曰明乎郊社之禮禘嘗之義治國其如示諸掌乎成王自謂予冲子夙夜毖祀此迓衡之要道也哀公問政至不可以不知天節螟蛉有可化之質蜾蠃有能化之材知是説然後可與言政也然則政之所託可非其人乎故曰為政在人人固未知若規矩凖䋲在我則方圓曲直無所逃矣故曰取人以身規矩凖䋲無他人道而已故修身以道修道以仁又曰失其身而能事其親吾未之聞矣故修身然後能事親至於能事親則修身之至也故曰思修身不可以不事親知事親則德之本立矣而不知人則上而事君下而取友去就從違莫知所向而貽其親之憂者有矣蓋取人以身不能事親安所取人哉其序由事親然後能知人至於能知人則事親之至也故曰思事親不可以不知人好學近乎知節知者不惑仁者不憂勇者不懼此成德也孔子自謂我無能焉夫成德豈易得乎能知好學力行知恥則可以入德矣齊明盛服至所以行之者一也節齊明所以一其志盛服所以修其容非禮勿動則内無逸德外無過行内外進矣則富貴不能淫貧賤不能移故修身則道立去䜛則任之專逺色則好之篤賤貨則義利分貴德則真偽核夫如是則見善明用心剛矣故尊賢則不惑尊其位所以貴之重其禄所以富之同其好以致其利同其惡以去其害則禮備而情親諸父昆弟所以望乎我者足矣故親親則不怨又曰人情莫不欲逸也時使之而使有餘力莫不欲富也薄歛之而使有餘財則子庶民之道也故百姓勸日省月試以程其能餼稟稱事以償其勞則惰者勉而勤者悦矣此來百工之道也故財用足送徃迎來以厚其禮嘉善而矜不能以致吾仁待之者甚周責之者甚約此柔逺人之道也故四方歸之繼絶世則賢者之類無不悦舉廢國則功臣之後無不勸亂者懼焉危者怙焉其來也節以時其徃也遣以禮則懷諸侯之道也夫如是則德之所施者博而威之所制者廣矣故天下畏之經雖有九而所以行之一者誠而已不誠則九經為虛文是無物也凡事豫則立節豫者前定之謂也惟至誠為能定惟前定為能應故以言則必行以事則必成以行則無悔以道則無方誠定之效如此故繼九經言之在下位節欲誠其意先致其知故不明乎善不誠乎身矣學至於誠身安徃而不致其極哉以内則順乎親以外則信乎友以上則可以得君以下則可以得民此舜之允塞所以五典克從也唯天下至誠為能盡其性章萬物皆備於我矣反身而誠樂莫大焉故惟天下至誠為能盡其性千萬人之性一已之性是也故能盡其性則能盡人之性萬物之性一人之性是也故能盡人之性則能盡物之性同焉皆得者各安其常則盡人之性也羣然皆生者各得其理則盡物之性也至於盡物之性則和氣充塞故可以贊天地之化育夫如是則天覆地載教化各任其職而成位乎其中矣其次致曲章誠者不思不勉直心而徑行也其次則臨言而必思不敢縱言也臨行而必擇不敢徑行也故曰致曲曲折而反諸心也擬議之間鄙詐不萌而忠信立矣故曲能有誠有諸中必形諸外故誠則形形於身必著於物故形則著誠至於著則内外洞徹清明在躬故著則明明則有以動衆故明則動動則有以易俗故動則變變則革汚以為清革暴以為良然猶有迹也化則其迹冺矣日用飲食而已至於化則神之所為也非天下之至誠孰能與於此誠者自成也節誠者非有成之者自成而已其道非有道之者自道而已自成自道猶言自本自根也以性言之為誠以理言之為道其實一也故至誠無息章博厚而不久則載物之德隳矣髙明而不久則覆物之道缺矣是則悠久者天地所以成終始也故所以成物大哉聖人之道章發育萬物峻極於天至道之功也禮儀三百威儀三千至道之具也洋洋乎言上際於天下蟠於地也優優大哉言動容周旋中禮也夫以三百三千之多儀非天下至誠孰能從容而盡中哉故曰待其人而後行盖盛德之至者人也故曰茍不至德至道不凝焉至德非他至誠而已矣又曰懲忿窒慾閑邪存誠此尊德性也非學以聚之問以辨之則擇善不明矣故繼之以道問學尊德性而道問學然後能致廣大尊其所聞行其所知充其德性之體使無不該徧此致廣大也非盡精㣲則無以極深而研㡬也故繼之以盡精㣲致廣大而盡精㣲然後能極高明始也未離乎方今則無方矣始也未離乎體今則無體矣離形去智廓然大通此極高明也非道中庸則無踐履可據之地不㡬於蕩而無執乎故繼之以道中庸高明者中庸之至理而中庸者高明之實德也其實非两體也仲尼祖述堯舜章中庸之道至仲尼而集大成故此書之末以仲尼明之道著於堯舜故祖述焉法詳於文武故憲章焉體元而亨利物而正一喜一怒通於四時夫是之謂律天時修其敎不易其俗齊其政不易其宜使五方之民各安其常各踐其性夫是之謂襲水土上律天時則天道之至正合下襲水土則地理之異宜全矣故博厚配地無不持載高明配天無不覆幬變通如四時之錯行照臨如日月之代明小以成小大以成大動者植者皆裕如也是謂並育而不相害或進或止或久或速無可無不可是謂並行而不相悖動以利物者智也故曰小德川流靜以裕物者仁也故曰大德敦化言川流則知敦化者仁之體言敦化則知川流者智之用唯天下至聖二章自惟天下至聖以下聰明睿智聖徳也寛裕温柔仁徳也發强剛毅義徳也齊莊中正禮徳也文理宻察智徳也溥博者其大無外淵泉者其深不測或容以為仁或執以為義或敬以為禮或别以為智惟其時而已此所謂時出之也夫然故外有以正天下之觀内有以通天下之志是以見而民敬言而民信行而民悦自西自東自南自北莫不心悦而誠服此至聖之德也天下之大經五品之民彛也凡為天下之常道皆可名為經而民彛為大經經綸者因性循理而治之無汩其序之謂也立天下之大本者建中於民也淵淵其淵非特如淵而已浩浩其天非特如天而已此至誠之道也德者其用也有目者所共見有心者所共知故凡有血氣者莫不尊親道者其本也非道同志一莫窺其奥故曰茍不固聰明聖智逹天德者其孰能知之盖至誠之道非至聖不能知至聖之德非至誠不能為故其言之序相因如此潛雖伏矣節君子内省不疚無惡於志君子所不可及者其惟人所不見乎言愼獨也拾遺莫見乎隱節人所不睹可謂隱矣而心獨知之不亦見乎人所不聞可謂㣲矣而心獨聞之不亦顯乎知莫見乎隱莫顯乎㣲而不能愼獨是自欺也其離道逺矣天下國家可均也節其斯以為舜則絶學無為矣君子依乎中庸節遯世不見知而不悔者疑慮不萌於心確乎其不可㧞也非離人而立於獨者不足以與此若不逺復者未免於有念也君子之道費而隱章唯費也則良知良能所自出故夫婦之愚不肖可以與知而能行焉唯隱也則非有思者所可知非有為者所可能故聖人有所不知不能焉盖聖人者德之成而業之大也過此以徃則神矣無方也不可知無體也不可能此七聖皆迷之地也孝經曰事父孝故事天明事母孝故事地察盖事父母之心雖夫婦之愚不肖亦與有焉及其至也天地明察神明彰矣則雖聖人之德又何以加此此中庸所以為至矣道不逺人三節夫道一以貫之無物我之間既曰忠恕則已違道矣然忠以盡已則將以至忘已也恕以盡物則將以至忘物也則善為道者莫近焉故雖違而不逺矣鬼神之爲德章道無不在鬼神具道之妙用也其德固不盛歟夫欲知鬼神之德者反求諸其心而已神將來舍則是神之格思也若正心以度之則乖矣所謂不可度思也正心度之猶不可又况得而忘之乎所謂不可射思也不可度故視不見聽不聞不可射故如在其上如在其左右也夫㣲之顯如此以其誠之不可揜也誠則物物皆彰矣故不可揜㣲之顯者其理也誠之不可揜以其德言也凡爲天下國家有九經曰修身也節經者其道有常而不可易其序有條而不可紊自誠明謂之性章自誠明由中出也故可名於性自明誠自外入也故可名於敎誠者因性故無不明明者致曲故能有誠至誠之道可以前知章至誠之道精一無間心合於氣氣合於神無聲無臭而天地之間物莫得以遁其形矣不既神矣乎誠者非自成已而已也節大學自誠意正心至治國平天下只一理此中庸所謂合外内之道也至誠無息至生物不測節至誠無息天行健也若文王之德之純是也未能無息而不息者君子之自强也若顔子之三月不違仁是也其為物不貳天地之得一也一則不已故覆載萬物雕刻衆形而莫知其端也故生物不測尊德性節尊其德性而道問學人德也致廣大而盡精㣲地德也極高明而道中庸天德也自人而天則上逹矣温故而知新所以博學而詳説之也敦厚以崇禮所以守約而處中也衣錦尚絅章無藏於中無交於物泊然純素獨與神明居此淡也然因性而已故曰不厭無聲無臭則離人而立於獨矣不失足於人不失色於人不失口於人此簡也然循理而已故文欲治其國先齊其家知逺之近也人人親其親長其長而天下平可不謂近矣乎欲齊其家先修其身知風之自也易於家人曰風自火出而君子以言有物行有恒不可謂所自乎欲修其身先正其心知㣲之顯也夫道視之不見聽之不聞而常不離心術日用之間可不謂顯矣乎所謂德者非甚高而難知也甚逺而難至也舉之則是故曰德輶如毛既以有所舉矣則必思而得勉而中是人道而有對故曰毛猶有倫若夫誠之至則無思無為從容中道是天道也故曰上天之載無聲無臭至矣補刋章節嗣考在天成象則鳥與火虛與昴四時迭見者天道之變也在地成形則作而長斂而藏四時異形者地道之變也至於成象者莫測其進退之機成形者莫見其生成之迹則天地之化也體化而裁之則無駭於變矣此變化之辯也聖人稽古之道不過三王而師古之道上及五帝若通其變使民不倦神而化之使民宜之雖百世聖人不能易也立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義夫道一而已矣其立於天下則有两端故君子有剛克焉執其義之端也有柔克焉執其仁之端也執其两端而用之以時中此九德所以有常而三德所以用義也孟子雜解人皆有不忍人之心章惻者心之感於物也隱者心之痛於中也物之體傷於彼而吾之心感應於此仁之體顯矣故君子之於禽獸見其生不忍見其死見其全不忍見其傷而况於民乎况於親戚乎故惻隱之心莫隆於親而民次之孟子曰君子親親而仁民仁民而愛物此自然之序也彼愛無差等者失其本心也已又曰惻隱痛傷也傷在彼而我傷之痛在彼而我痛之傷痛非自外至也因心則然此惻隱所以為仁之端也至於充其心體之本然則萬物一體矣無物我之間也故天下歸仁焉燕人畔章象之惡已著而其志不過富貴而已故舜得以是而全之若管叔之惡則未著而其志其才皆非象比也周公詎忍逆探其兄之惡而棄之耶周公愛兄宜無不盡者管叔之事聖人之不幸也舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也規矩方員之至也章愛敬盡於事親則孝之性盡矣盡之云者愛敬之道於是至矣不可以有加焉舜盡事親之道而瞽瞍底豫天下之為父子者定其理正如此也孟子言聖人人倫之至也人倫至於聖人而後為至者蓋非盡性不能也學者之於人倫亦期於盡而已矣居下位而不獲於上章欲誠其意先致其知故不明乎善不誠乎身矣學至於誠身安徃而不致其極哉以内則順乎親以外則信乎友以上則可以得君以下則可以得民此舜之允塞所以五典克從也然有誠者有誠之者不勉而中無為也不思而得無思也從容乎中道是聖人之事也故為天道至於擇善則有思矣固執之則有為矣拳拳乎中道是賢人之事也故為人之道聖賢雖異禀其為誠身一也詩云娶妻如之何章告而娶義之小者也廢人之大倫罪之大者也瞽瞍之頑告則不得娶舜知之宜審矣故受不告之名而不忍䧟父於廢大倫之罪如必先告俟其不從然後違之則是重拂其親之意而反彰其惡也故其不告君子以為猶告盡其心者章盡其心則心地無餘藴而性之本體見矣知其性則廣大悉備天理全而人偽冺矣夫是之謂極高明存其心者閑邪以存其誠也飬其性者守静以復其本也欲不外馳忿不内作反聽内視以歸有極則存其心之道也其志致一其氣致專至大至剛以直則養其性之道也存養至此則與天地相似而不違矣故足以事天夫是之謂道中庸極高明者理極於知天也道中庸者德全於事天也知天者造其理也事天者履其事也徒造其理而不履其事是為知君上之為我尊而未嘗致恭也知父母之為我親而未嘗致養也其忠孝安在哉知天智之盡也事天仁之至也仁之至智之盡也則死生為晝夜矣豈殀夀所能惑其心哉亦曰修身以俟之自作元命而已形色天性也章形者性之質也能盡其性則踐其形而無愧矣盖萬物皆備於我則其所有何物不備反身而誠樂莫大焉為其能盡性而踐形也若反身未至於誠則是於性有所不盡未能盡性則於質有所不充矣故曰惟聖人然後可以踐形箕子曰視曰明聽曰聰視謂之明聽謂之聰皆耳目之本然也能盡視聽之性則能盡耳目之形茍視聽不足於聰明則有耳目之形而無視聽之實德也豈不歉於形哉揚子曰聖人耳不順乎非口不𨽻乎不善若非禮勿視非禮勿言則於口耳猶有所擇是未足以言踐形仁也者人也章仁者以道之在人者名之也立人之道則仁之名所以立合而言之則仁與人冺矣此其所以為道也游廌山集卷一
