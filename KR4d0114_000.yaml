body:
  text: 遊豸山集别集類二宋提要臣等謹案遊豸山集四卷宋遊酢撰酢字定夫建陽人元豐五年進士建中靖國初厯官監察御史宣和初終於知濠州事迹具宋史道學傳楊時龜山集有酢墓志銘稱所著有中庸義一卷易説一卷詩二南義一卷論語孟子雜解各一卷文集十卷年譜稱其年二十九録明道先生語年四十一録伊川先生語年四十六作論孟雜解中庸義年四十七作易説詩二南義而不言文集蓋夲各為書也此夲首以論語雜解中庸義孟子雜解為一卷次易説詩二南義為一卷次師語師訓為一卷次以文七篇詩十三首附以墓志年譜為一卷又中庸義後有拾遺孟子雜解僅八條詩二南義僅二條蓋後人掇拾重編不但非其原夲且併非完書矣春日山行詩中有風詠舞雩正此日雪飄伊洛是何年之句自用程門立雪故實似亦不類酢作以其為宋儒遺書别無他本姑録之以備一家焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1fe5b986c017f04f626c4b3b0d3ba2256f0dceef8eb1e37e19bb5b864e284293
